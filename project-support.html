  <script src="shared.js" type="text/babel"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { TextReveal, GlassReveal, Header, Footer, BottomCTA } = window;

    function Hero() {
      return (
        <section className="relative bg-darkheading min-h-[80vh] flex items-end overflow-hidden px-6 md:px-12 pt-32 pb-16 md:pb-20">
          <img
            src="img/lifestyle-modern-facade.webp"
            alt="Technical detail of an aluminum window system"
            className="absolute inset-0 h-full w-full object-cover opacity-55"
          />
          <div className="absolute inset-0 bg-gradient-to-t from-black/85 via-black/30 to-transparent"></div>

          <div className="relative z-10 max-w-3xl">
            <TextReveal>
              <p className="text-[14px] font-medium tracking-[0.15em] text-white uppercase mb-4">Project Support</p>
            </TextReveal>
            <TextReveal delay={100}>
              <h1 className="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-light leading-tight text-white">
                Supporting the project,<br/>not just the order.
              </h1>
            </TextReveal>
            <TextReveal delay={200}>
              <p className="mt-6 max-w-xl text-[15px] leading-[1.75] text-white/60">
                Crystal Ball delivers three engagement models depending on the scope, team, and risk profile of the project. All three are backed by construction-experienced project support.
              </p>
            </TextReveal>
            <TextReveal delay={300}>
              <a href="contact.html" className="group relative mt-8 inline-flex items-center justify-center overflow-hidden border border-white px-7 py-3 text-[14px] leading-none tracking-[0.09em] uppercase outline-none">
                <span className="absolute inset-0 bg-white -translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.77,0,0.175,1)] group-hover:translate-x-0 z-0"></span>

              </a>
            </TextReveal>
          </div>
        </section>
      );
    }

    // Was: text left + white "Included" card on right. Now: text + bullet list
    // stack on left, image on right (Pattern: Model 01 image right, Model 02
    // image left, Model 03 image right). White card removed.
    function SupplyOnly() {
      const items = [
        'System specification guidance',
        'Technical detailing support',
        'Submittal and shop drawing coordination',
        'Delivery and logistics coordination',
        'Performance-driven consultation through procurement',
      ];
      return (
        <section className="bg-obsidian w-full relative">
          <div className="grid gap-12 lg:grid-cols-2 items-center">
            <div className="px-6 md:pl-[max(1.5rem,calc((100vw_-_80rem)/2_+_1.5rem))] md:pr-14 py-20 md:py-28">
              <div className="max-w-xl">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">MODEL 01</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Supply Only.</h2></TextReveal>
              <TextReveal delay={200}>
                <div className="mt-8 border-l-2 border-glass pl-5">
                  <p className="text-[14px] font-bold tracking-[0.15em] text-darkheading uppercase mb-2">Best for</p>
                  <p className="text-[15px] leading-7 text-[#4D4D4D]/80">Builders, GCs, and dealers with established installation teams who want premium systems plus technical support — without subcontracting installation.</p>
                </div>
              </TextReveal>
              <TextReveal delay={300}><p className="mt-8 text-[14px] font-bold tracking-[0.2em] text-glass uppercase">Included</p></TextReveal>
              <ul className="mt-4 space-y-3">
                {items.map((t, i) => (
                  <TextReveal key={t} delay={400 + i * 70}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span>{t}</li></TextReveal>
                ))}
              </ul>
              <TextReveal delay={800}><p className="mt-8 text-[14px] leading-7 text-[#4D4D4D] italic">This is the default model for most commercial GCs and experienced custom builders.</p></TextReveal>

            </div>
            <div className="p-8 md:py-20 md:pl-14 md:pr-0">
              <GlassReveal delay={100} className="relative h-[300px] md:h-[400px] w-full">
                <div className="h-full w-full overflow-hidden">
                  <img src="img/82-Wilson-Ave.-Kitchener-Ontario-1.jpeg" alt="82 Wilson Ave project — Supply Only delivery" className="absolute inset-0 h-full w-full object-cover" />

              </GlassReveal>
            </div>
          </div>
        </section>
      );
    }

      const items = [
        'Everything in Supply Only',
        'Installation under Crystal Ball oversight',
        'Quality control aligned to system performance criteria',
        'Direct accountability for system integration',
        'Post-installation review and closeout',
      ];
      return (
        <section className="bg-ink w-full relative">
          <div className="grid gap-12 lg:grid-cols-[1.2fr_1fr] items-center">
            <div className="p-8 md:py-20 md:pr-14 md:pl-0">
              <GlassReveal className="relative h-[500px] w-full">
                <div className="h-full w-full overflow-hidden">
                  <img src="img/lifestyle-home-exterior.webp" className="absolute inset-0 h-full w-full object-cover" />
                </div>
              </GlassReveal>
            </div>
            <div className="px-6 md:pr-[max(1.5rem,calc((100vw_-_80rem)/2_+_1.5rem))] md:pl-14 py-20 md:py-28">
              <div className="max-w-xl">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">MODEL 02</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Supply & Installation.</h2></TextReveal>
              <TextReveal delay={200}>
                <div className="mt-8 border-l-2 border-glass pl-5">
                  <p className="text-[14px] font-bold tracking-[0.15em] text-darkheading uppercase mb-2">Best for</p>
                  <p className="text-[15px] leading-7 text-[#4D4D4D]/80">Clients who want single-point responsibility on the facade scope — and want installation executed against Crystal Ball's quality standards.</p>
                </div>
              </TextReveal>
              <p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase mt-10 mb-6">Included</p>
              <ul className="space-y-3">
                {items.map((t, i) => (
                  <TextReveal key={t} delay={300 + i * 70}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span>{t}</li></TextReveal>
                ))}
              </ul>
              <TextReveal delay={700}><p className="mt-8 text-[14px] leading-7 text-[#4D4D4D] italic">This is the right call when system performance is critical and you need one team responsible from shop drawing through punch list.</p></TextReveal>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // Was: text left + white "Included" card on right. Now: text + bullet list
    // stack on right, image on left (alternating with SupplyOnly above). White
    // card removed.
    function Advisory() {
      const items = [
        'Early-stage design collaboration',
        'System options against design intent and performance targets',
        'Shop drawing review and coordination',
        'Structural and anchoring considerations',
        'Logistics and sequencing planning',
        'Site readiness guidance',
        'Post-installation review (separate engagement available)',
      ];
      return (
        <section id="advisory" className="bg-obsidian w-full relative scroll-mt-24">
          <div className="grid gap-12 lg:grid-cols-2 items-center">
            <div className="p-8 md:py-20 md:pr-14 md:pl-0">
              <GlassReveal delay={100} className="relative h-[300px] md:h-[400px] w-full">
                <div className="h-full w-full overflow-hidden">
                  <img src="img/lifestyle-curtain-wall-interior.webp" alt="Curtain wall reference — Facade Advisory" className="absolute inset-0 h-full w-full object-cover" />
                </div>
              </GlassReveal>
            </div>
            <div className="px-6 md:pr-[max(1.5rem,calc((100vw_-_80rem)/2_+_1.5rem))] md:pl-14 py-20 md:py-28">
              <div className="max-w-xl">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">MODEL 03</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Facade Advisory & Coordination.</h2></TextReveal>
              <TextReveal delay={200}>
                <div className="mt-8 border-l-2 border-glass pl-5">
                  <p className="text-[14px] font-bold tracking-[0.15em] text-darkheading uppercase mb-2">Best for</p>
                  <p className="text-[15px] leading-7 text-[#4D4D4D]/80">Architects, developers, and project teams who need facade expertise in the early stages of design — before procurement, before tender, before the supplier conversation gets locked in.</p>
                </div>
              </TextReveal>
              <TextReveal delay={300}><p className="mt-8 text-[14px] font-bold tracking-[0.2em] text-glass uppercase">Included</p></TextReveal>
              <ul className="mt-4 space-y-3">
                {items.map((t, i) => (
                  <TextReveal key={t} delay={400 + i * 70}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span>{t}</li></TextReveal>
                ))}

              <TextReveal delay={1000}><p className="mt-8 text-[15px] font-bold text-[#1A1A1A]">Facade Advisory is a paid engagement. It is structured to bring envelope expertise into the project at the stage where it has the most impact.</p></TextReveal>

        { situation: 'Facade performance is mission-critical and you want one team accountable', recommended: 'Supply & Install' },
        { situation: 'You need expert input on system selection before tender', recommended: 'Facade Advisory' },
        { situation: "You're a dealer adding premium European systems to your offering", recommended: 'Supply Only (via Dealer Program)' },
      ];
      return (
        <section className="bg-ink px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="max-w-3xl mb-12">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">CHOOSE YOUR MODEL</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Which delivery model fits your project.</h2></TextReveal>
            </div>
            <GlassReveal>
              <div>
                <div className="hidden md:grid grid-cols-[2fr_1.4fr] border-y border-black/10">
                  <div className="p-5 text-[14px] font-bold tracking-[0.2em] text-darkheading uppercase">Situation</div>
                  <div className="p-5 text-[14px] font-bold tracking-[0.2em] text-darkheading uppercase">Recommended Model</div>
                </div>
                {rows.map((r, i) => (
                  <div key={r.situation} className={`grid md:grid-cols-[2fr_1.4fr] ${i < rows.length - 1 ? 'border-b border-black/10' : 'border-b border-black/10'}`}>
                    <div className="p-6 md:p-7 text-[15px] leading-7 text-[#4D4D4D] font-medium">{r.situation}</div>
                    <div className="p-6 md:p-7 text-[15px] font-medium text-[#1A1A1A]">{r.recommended}</div>
                  </div>
                ))}

              <a href="contact.html" className="inline-flex items-center justify-center text-[14px] font-bold tracking-[0.2em] text-darkheading uppercase hover:text-glass transition">Discuss your project →</a>
            </div>
          </div>
        </section>
      );

      return (
        <React.Fragment>
          <Header currentPage="project-support" />
          <main className="min-h-screen">
            <Hero />
            <SupplyOnly />
            <SupplyAndInstall />
            <Advisory />
            <WhichModel />
            <BottomCTA />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
