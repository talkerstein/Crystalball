  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: '#FEFEFE', obsidian: '#F9FAFB', graphite: '#F3F4F6', glass: '#6B7280', frost: '#EAF7FA', silver: '#4D4D4D', line: 'rgba(0,0,0,0.1)', canvas: '#FEFEFE', charcoal: '#4D4D4D', darkheading: '#1A1A1A', accentblue: '#6B7280' },
      fontFamily: { montserrat: ['Montserrat', 'sans-serif'] },
      boxShadow: { glow: '0 0 25px rgba(107, 114, 128, 0.1)', glass: 'inset 0 0 18px rgba(255,255,255,0.7), 0 18px 60px rgba(0,0,0,0.06)' },
    } } };
  </script>

<body class="noise font-montserrat">
  <div id="root"></div>

  <script src="shared.js" type="text/babel"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { TextReveal, GlassReveal, Header, Footer, BottomCTA } = window;

    function Hero() {
      return (
        <section className="relative bg-canvas min-h-[60vh] pt-32 pb-20 px-6">
          <div className="mx-auto max-w-7xl relative z-10">
            <div className="max-w-4xl">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">PROJECT SUPPORT</p></TextReveal>
              <TextReveal delay={100}><h1 className="mt-5 text-5xl font-light leading-[1.05] tracking-[0.12em] md:text-7xl text-[#4D4D4D]">SUPPORTING THE<br/>PROJECT, NOT JUST<br/>THE ORDER.</h1></TextReveal>
              <TextReveal delay={200}><div className="my-8 h-1 w-16 bg-[#4D4D4D]/80"></div></TextReveal>
              <TextReveal delay={300}><p className="text-xl text-charcoal leading-relaxed font-medium">Crystal Ball delivers three engagement models depending on the scope, team, and risk profile of the project. All three are backed by construction-experienced project support.</p></TextReveal>
            </div>
          </div>
        </section>
      );
    }

    function SupplyOnly() {
      const items = [
        'System specification guidance',
        'Technical detailing support',
        'Submittal and shop drawing coordination',
        'Delivery and logistics coordination',
        'Performance-driven consultation through procurement',
      ];
      return (
        <section className="bg-obsidian border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="grid gap-12 lg:grid-cols-[1fr_1.2fr] items-start">
              <div>
                <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">MODEL 01</p></TextReveal>
                <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Supply Only.</h2></TextReveal>
                <TextReveal delay={200}>
                  <div className="mt-8 border-l-2 border-glass pl-5">
                    <p className="text-[14px] font-bold tracking-[0.15em] text-darkheading uppercase mb-2">Best for</p>
                    <p className="text-[15px] leading-7 text-[#4D4D4D]/80">Builders, GCs, and dealers with established installation teams who want premium systems plus technical support — without subcontracting installation.</p>
                  </div>
                </TextReveal>
                <TextReveal delay={300}><p className="mt-8 text-[14px] leading-7 text-[#4D4D4D] italic">This is the default model for most commercial GCs and experienced custom builders.</p></TextReveal>
              </div>
              <GlassReveal delay={100} className="h-full">
                <div className="border border-black/10 bg-white p-8 h-full">
                  <p className="text-[12px] font-bold tracking-[0.2em] text-glass uppercase mb-6">Included</p>
                  <ul className="space-y-3">
                    {items.map((t, i) => (
                      <TextReveal key={t} delay={200 + i * 70}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span>{t}</li></TextReveal>
                    ))}
                  </ul>
                </div>
              </GlassReveal>
            </div>
          </div>
        </section>
      );
    }

    function SupplyAndInstall() {
      const items = [
        'Everything in Supply Only',
        'Installation under Crystal Ball oversight',
        'Quality control aligned to system performance criteria',
        'Direct accountability for system integration',
        'Post-installation review and closeout',
      ];
      return (
        <section className="bg-ink border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="grid gap-12 lg:grid-cols-[1.2fr_1fr] items-start">
              <GlassReveal className="relative h-[500px] w-full">
                <div className="h-full w-full border border-black/10 overflow-hidden shadow-xl">
                  <img src="https://crystal-ball.ca/wp-content/uploads/2026/05/al_098.20-1852x1080.jpg.webp" className="absolute inset-0 h-full w-full object-cover" />
                </div>
              </GlassReveal>
              <div>
                <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">MODEL 02</p></TextReveal>
                <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Supply & Installation.</h2></TextReveal>
                <TextReveal delay={200}>
                  <div className="mt-8 border-l-2 border-glass pl-5">
                    <p className="text-[14px] font-bold tracking-[0.15em] text-darkheading uppercase mb-2">Best for</p>
                    <p className="text-[15px] leading-7 text-[#4D4D4D]/80">Clients who want single-point responsibility on the facade scope — and want installation executed against Crystal Ball's quality standards.</p>
                  </div>
                </TextReveal>
                <p className="text-[12px] font-bold tracking-[0.2em] text-glass uppercase mt-10 mb-6">Included</p>
                <ul className="space-y-3">
                  {items.map((t, i) => (
                    <TextReveal key={t} delay={300 + i * 70}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span>{t}</li></TextReveal>
                  ))}
                </ul>
                <TextReveal delay={700}><p className="mt-8 text-[14px] leading-7 text-[#4D4D4D] italic">This is the right call when system performance is critical and you need one team responsible from shop drawing through punch list.</p></TextReveal>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Advisory() {
      const items = [
        'Early-stage design collaboration',
        'System options against design intent and performance targets',
        'Shop drawing review and coordination',
        'Structural and anchoring considerations',
        'Logistics and sequencing planning',
        'Site readiness guidance',
        'Post-installation review (separate engagement available)',
      ];
      return (
        <section id="advisory" className="bg-obsidian border-t border-black/10 px-6 py-28 relative scroll-mt-24">
          <div className="mx-auto max-w-7xl">
            <div className="grid gap-12 lg:grid-cols-[1fr_1.2fr] items-start">
              <div>
                <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">MODEL 03</p></TextReveal>
                <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Facade Advisory & Coordination.</h2></TextReveal>
                <TextReveal delay={200}>
                  <div className="mt-8 border-l-2 border-glass pl-5">
                    <p className="text-[14px] font-bold tracking-[0.15em] text-darkheading uppercase mb-2">Best for</p>
                    <p className="text-[15px] leading-7 text-[#4D4D4D]/80">Architects, developers, and project teams who need facade expertise in the early stages of design — before procurement, before tender, before the supplier conversation gets locked in.</p>
                  </div>
                </TextReveal>
                <TextReveal delay={400}><p className="mt-8 text-[15px] font-bold text-[#1A1A1A]">Facade Advisory is a paid engagement. It is structured to bring envelope expertise into the project at the stage where it has the most impact.</p></TextReveal>
              </div>
              <GlassReveal delay={100} className="h-full">
                <div className="border border-black/10 bg-white p-8 h-full">
                  <p className="text-[12px] font-bold tracking-[0.2em] text-glass uppercase mb-6">Included</p>
                  <ul className="space-y-3">
                    {items.map((t, i) => (
                      <TextReveal key={t} delay={200 + i * 70}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span>{t}</li></TextReveal>
                    ))}
                  </ul>
                </div>
              </GlassReveal>
            </div>
          </div>
        </section>
      );
    }

    function WhichModel() {
      const rows = [
        { situation: 'You have installation capability and want premium systems', recommended: 'Supply Only' },
        { situation: 'Facade performance is mission-critical and you want one team accountable', recommended: 'Supply & Install' },
        { situation: 'You need expert input on system selection before tender', recommended: 'Facade Advisory' },
        { situation: "You're a dealer adding premium European systems to your offering", recommended: 'Supply Only (via Dealer Program)' },
      ];
      return (
        <section className="bg-ink border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="max-w-3xl mb-12">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">CHOOSE YOUR MODEL</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Which delivery model fits your project.</h2></TextReveal>
            </div>
            <GlassReveal>
              <div className="border border-black/10 bg-white">
                <div className="hidden md:grid grid-cols-[2fr_1.4fr] border-b border-black/10 bg-obsidian">
                  <div className="p-5 text-[12px] font-bold tracking-[0.2em] text-darkheading uppercase">Situation</div>
                  <div className="p-5 text-[12px] font-bold tracking-[0.2em] text-darkheading uppercase">Recommended Model</div>
                </div>
                {rows.map((r, i) => (
                  <div key={r.situation} className={`grid md:grid-cols-[2fr_1.4fr] ${i < rows.length - 1 ? 'border-b border-black/10' : ''}`}>
                    <div className="p-6 md:p-7 text-[15px] leading-7 text-[#4D4D4D] font-medium border-r-0 md:border-r border-black/10">{r.situation}</div>
                    <div className="p-6 md:p-7 text-[15px] font-medium text-[#1A1A1A]">{r.recommended}</div>
                  </div>
                ))}
              </div>
            </GlassReveal>
            <div className="mt-10">
              <a href="contact.html" className="inline-block text-[13px] font-bold tracking-[0.2em] text-darkheading uppercase hover:text-glass transition">Discuss your project →</a>
            </div>
          </div>
        </section>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <Header currentPage="project-support" />
          <main className="min-h-screen">
            <Hero />
            <SupplyOnly />
            <SupplyAndInstall />
            <Advisory />
            <WhichModel />
            <BottomCTA />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
