<body class="noise font-questrial">

  <script type="text/babel">

          <div className="absolute inset-0 bg-gradient-to-t from-black/85 via-black/30 to-transparent"></div>

          <div className="relative z-10 max-w-3xl">
            <TextReveal>

            </TextReveal>
            <TextReveal delay={100}>

                The system makes<br/>the architecture.
              </h1>
            </TextReveal>
            <TextReveal delay={200}>
              <p className="mt-6 max-w-xl text-[15px] leading-[1.75] text-white/60">
                European-engineered systems for architects and custom home builders working at the upper end of residential — where the wall becomes glass, the opening becomes the room, and the envelope has to perform in real Canadian weather.

              <a href="contact.html?inquiry=residential" className="group relative mt-8 inline-flex items-center justify-center overflow-hidden border border-white px-7 py-3 text-[14px] leading-none tracking-[0.09em] uppercase outline-none">
                <span className="absolute inset-0 bg-white -translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.77,0,0.175,1)] group-hover:translate-x-0 z-0"></span>
                <span className="relative z-10 text-white group-hover:text-darkheading transition-colors duration-500">Discuss a custom project</span>
              </a>
            </TextReveal>

    function WhoThisIsFor() {
      return (
        <section className="bg-canvas px-6 py-20 md:py-28">
          <div className="mx-auto max-w-7xl">
            <div className="grid gap-12 md:grid-cols-2 items-center">
              <GlassReveal delay={100} className="relative h-[500px] w-full">
                <div className="h-full w-full overflow-hidden">
                  <img src="img/market-custom-modern-home.webp" alt="82 Wilson Ave, Kitchener" className="absolute inset-0 h-full w-full object-cover" />
                </div>
              </GlassReveal>
              <div>
                <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">Who this is for</p></TextReveal>
                <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] mb-6 md:text-4xl">When standard residential windows aren't the answer.</h2></TextReveal>
                <TextReveal delay={200}><p className="text-[15px] leading-8 text-[#4D4D4D]/80 mb-6">You are not looking for stock fenestration. You are looking for systems that:</p></TextReveal>
                <ul className="space-y-3">
                  {[
                    'Carry large-format glazing without compromising performance',
                    'Operate cleanly at scale — Tilt & Turn, Lift & Slide, Bi-fold',
                    'Hit Passive House or Net Zero targets without retrofitting around them',
                    'Look the way the architecture intends — narrow sightlines, minimal frame',
                    'Survive Canadian winters and shoulder-season condensation cycles',
                  ].map((t, i) => (
                    <TextReveal key={t} delay={300 + i * 70}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span>{t}</li></TextReveal>
                  ))}
                </ul>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // --- ALTERNATING-ROW PRIMITIVES (mirrors About + commercial-developers) ---
    // Rows constrained to `mx-auto max-w-7xl px-6` to match the
    // surrounding untouched sections (Hero, PassiveHouse, WithBuilders).
    // Section bg still spans the full viewport; only content is
    // constrained. RowText/RowImage no longer carry their own bg — the
    // section bg shows through uniformly so the 80px image frame blends
    // seamlessly into the row.
    function Row({ children, flip = false, bg = 'bg-canvas' }) {
      return (
        <section className={`${bg} w-full`}>
          <div className={`grid grid-cols-1 md:grid-cols-2 ${flip ? 'md:[direction:rtl]' : ''}`}>
            {React.Children.map(children, (child) =>
              React.isValidElement(child) ? React.cloneElement(child, { flip }) : child
            )}
          </div>
        </section>
      );
    }
    function RowText({ children, flip = false }) {
      // Outer (viewport-facing) padding mirrors the page's max-w-7xl
      // gutter so text aligns with the header + every other max-w-7xl
      // bounded section on the page. Inner side keeps a 56px buffer
      // between text and the adjacent image.
      const padX = flip
        ? 'md:pr-[max(1.5rem,calc((100vw_-_80rem)/2_+_1.5rem))] md:pl-14'
        : 'md:pl-[max(1.5rem,calc((100vw_-_80rem)/2_+_1.5rem))] md:pr-14';
      return (
        <div className={`md:[direction:ltr] px-6 ${padX} py-12 md:py-20 flex flex-col justify-center`}>
          <div className="max-w-xl">{children}</div>
        </div>
      );
    }
    function RowImage({ src, alt = '', flip = false }) {
      // Image is flush to the viewport edge on its outer side. Mobile keeps
      // 32px padding all around (rows stack vertically there). On md+:
      //   flip=false -> image is visually on the RIGHT -> drop right padding
      //   flip=true  -> image is visually on the LEFT  -> drop left padding
      const padX = flip ? 'md:pl-0 md:pr-14' : 'md:pr-0 md:pl-14';
      return (
        <div className={`md:[direction:ltr] p-8 md:py-20 ${padX} flex`}>
          <div className="relative w-full overflow-hidden min-h-[280px] md:min-h-[480px]">
            <img src={src} alt={alt} className="absolute inset-0 h-full w-full object-cover" />
          </div>
        </div>
      );
    }
    function SectionHeader({ eyebrow, title, intro, bg = 'bg-obsidian' }) {
      return (
        <section className={`${bg} px-6 pt-20 md:pt-28 pb-10 md:pb-14`}>
          <div className="mx-auto max-w-7xl">
            <div className="max-w-2xl">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">{eyebrow}</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">{title}</h2></TextReveal>
              {intro && <TextReveal delay={200}><p className="mt-6 text-[15px] leading-[1.8] text-[#4D4D4D]">{intro}</p></TextReveal>}
            </div>
          </div>
        </section>
      );
    }
    function PillarTitle({ children, delay = 100 }) {
      return (
        <TextReveal delay={delay}>
          <h3 className="text-[14px] font-medium tracking-[0.04em] uppercase text-[#1A1A1A] mb-3">{children}</h3>
        </TextReveal>
      );
    }
    function PillarBody({ children, delay = 200 }) {
      return (
        <TextReveal delay={delay}>
          <p className="text-[14px] leading-[1.8] text-[#4D4D4D]">{children}</p>
        </TextReveal>
      );
    }

    // --- SYSTEMS — boxed card grid (image + h3 + body, no chrome) ---
    // Was: full-bleed alternating rows. Reverted to a card grid (matching
    // homepage pattern) so the section is the same width as the
    // surrounding boxed sections (WhoThisIsFor, PassiveHouse, etc.).
    // Intro centered above the grid as a lead-in.
    function Systems() {
      const items = [
        { title: 'Tilt & Turn Windows', body: 'Inward-opening European system. Superior air sealing. Two operations from a single hardware set. The default choice for performance-driven custom homes.', image: 'img/market-custom-entry-home.webp', alt: 'Tilt and turn aluminum window' },
        { title: 'Lift & Slide Doors', body: 'Multi-panel glazed walls that operate at scale. Engineered for thermal performance, not just visual effect.', image: 'img/market-custom-interior.webp', alt: 'Lift and slide door system' },
        { title: 'Bi-fold Doors', body: 'Indoor-outdoor opening at residential scale.', image: 'img/market-custom-lake-home.webp', alt: 'Bi-fold door system' },
        { title: 'Large-Format Fixed & Specialty Glazing', body: 'Architectural openings without performance compromise.', image: 'img/market-custom-mountain-home.webp', alt: 'Large-format glazing assembly' },
        { title: 'Casement & Awning', body: 'North American configurations when project context calls for them — at European performance levels.', image: 'img/market-custom-modern-home.webp', alt: 'Fiberglass casement window' },
      ];
      return (
        <section className="bg-obsidian px-6 py-20 md:py-28">
          <div className="mx-auto max-w-7xl">
            <div className="max-w-2xl mb-12 md:mb-16">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">SYSTEM STRENGTHS</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Systems built for the design.</h2></TextReveal>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 md:gap-12">
              {items.map((it, i) => (
                <TextReveal key={it.title} delay={(i % 3) * 100}>
                  <div className="flex flex-col h-full">
                    <div className="relative w-full aspect-[3/2] overflow-hidden mb-6">
                      <img src={it.image} alt={it.alt} className="absolute inset-0 h-full w-full object-cover transition duration-700 hover:scale-105" />
                    </div>
                    <h3 className="text-xl md:text-2xl font-light leading-tight text-[#1A1A1A] mb-3">{it.title}</h3>
                    <p className="text-[14px] leading-7 text-[#4D4D4D]/85">{it.body}</p>
                  </div>
                </TextReveal>
              ))}
            </div>
            <div className="mt-16 text-center">
              <a href="products.html" className="inline-flex items-center justify-center text-[14px] font-bold tracking-[0.2em] text-darkheading uppercase hover:text-glass transition">See full system range →</a>
            </div>
          </div>
        </section>
      );
    }

      const items = [

        { title: 'Air infiltration', body: 'Sealing performance for tight envelopes.' },

                <TextReveal delay={200}><p className="mt-6 text-[15px] leading-8 text-[#4D4D4D]/80">Every system supplied for residential is evaluated against:</p></TextReveal>

                    <TextReveal key={it.title} delay={300 + i * 80}>

                    </TextReveal>

    function WithArchitects() {
      const items = [
        'System options against the design language — sightline, mullion, finish',
        'Performance targets translated into product specification',
        'Coordination with structural, mechanical, and air barrier scope',
        'Shop drawings reviewed against architectural intent',
        'Substitution review when project budget reshapes the scope',
      ];
      return (
        <section className="bg-obsidian px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="max-w-3xl">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">WORKING WITH ARCHITECTS</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Specification support that respects the design intent.</h2></TextReveal>
              <TextReveal delay={200}><p className="mt-6 text-[15px] leading-8 text-[#4D4D4D]/80">We engage early, on the architect's terms:</p></TextReveal>
            </div>
            <ul className="mt-10 grid gap-3 md:grid-cols-2 md:gap-x-12">
              {items.map((t, i) => (
                <TextReveal key={t} delay={i * 70}>
                  <li className="flex items-start text-[15px] font-medium text-[#4D4D4D] py-2"><span className="mr-3 mt-1 text-glass">■</span>{t}</li>
                </TextReveal>
              ))}
            </ul>
            <TextReveal delay={500}><p className="mt-10 text-[16px] font-bold text-[#1A1A1A] max-w-3xl">This is not "value engineering" the design. It is matching the right system to the right opening.</p></TextReveal>
          </div>
        </section>

    }

    function WithBuilders() {
      const items = [
        'Rough opening detailing',
        'Air and water continuity at the window perimeter',
        'Anchoring strategies for oversized glazing',
        'Thermal break continuity',
        'Installation oversight available under Supply & Install',
        'Post-install verification on critical assemblies',
      ];
      return (
        <section className="bg-ink px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="grid gap-12 lg:grid-cols-2 items-center">
              <GlassReveal className="relative h-[500px] w-full">
                <div className="h-full w-full overflow-hidden">
                  <img src="img/market-custom-entry-home.webp" className="absolute inset-0 h-full w-full object-cover" />
                </div>
              </GlassReveal>
              <div>
                <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">WORKING WITH CUSTOM BUILDERS</p></TextReveal>
                <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Installation discipline that protects the wall.</h2></TextReveal>
                <TextReveal delay={200}><p className="mt-6 text-[15px] leading-8 text-[#4D4D4D]/80">For builders managing the envelope as a system, not a checklist:</p></TextReveal>
                <ul className="mt-6 space-y-3">
                  {items.map((t, i) => (
                    <TextReveal key={t} delay={300 + i * 70}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span>{t}</li></TextReveal>
                  ))}
                </ul>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Heritage() {
      const items = [
        'Heritage-sensitive replacement specifications',
        'Sightline matching against historic profiles',
        'Performance upgrades within design constraints',
        'Coordination with heritage consultants and approvals',
      ];
      return (
        <section className="bg-obsidian px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="max-w-3xl mb-12">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">ARCHITECTURALLY SIGNIFICANT HOMES</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Heritage performance, modern execution.</h2></TextReveal>
              <TextReveal delay={200}><p className="mt-6 text-[15px] leading-8 text-[#4D4D4D]/80">When the home is worth keeping and the windows are at end of life, the replacement specification matters more than usual. We support:</p></TextReveal>
            </div>
            <ul className="grid gap-3 md:grid-cols-2 md:gap-x-12">
              {items.map((t, i) => (
                <TextReveal key={t} delay={i * 70}>
                  <li className="flex items-start text-[15px] font-medium text-[#4D4D4D] py-2"><span className="mr-3 mt-1 text-glass">■</span>{t}</li>
                </TextReveal>
              ))}
            </ul>
          </div>
        </section>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <Header currentPage="markets" />
          <main className="min-h-screen">
            <Hero />
            <WhoThisIsFor />
            <Systems />
            <PassiveHouse />
            <WithArchitects />
            <WithBuilders />
            <Heritage />
            <BottomCTA />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
