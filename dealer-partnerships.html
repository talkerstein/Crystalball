<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Become a Crystal Ball Dealer | European Window & Door Partnership for Canadian Dealers</title>
  <meta name="description" content="Regional Canadian window and door dealers gain access to premium European systems, technical support, and project-level advisory through Crystal Ball's dealer partnership program." />

  <link rel="icon" type="image/png" href="img/Crystal-Ball-Full-Color-Vertical-scaled.png" />
  <link rel="apple-touch-icon" href="img/Crystal-Ball-Full-Color-Vertical-scaled.png" />
  <link rel="canonical" href="https://curious-concha-f11e49.netlify.app/dealer-partnerships.html" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Crystal Ball Windows & Doors" />
  <meta property="og:title" content="Become a Crystal Ball Dealer | European Window & Door Partnership for Canadian Dealers" />
  <meta property="og:description" content="Regional Canadian window and door dealers gain access to premium European systems, technical support, and project-level advisory through Crystal Ball's dealer partnership program." />
  <meta property="og:image" content="img/MDS-REALIZACJE.jpg" />
  <meta property="og:url" content="https://curious-concha-f11e49.netlify.app/dealer-partnerships.html" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Become a Crystal Ball Dealer" />
  <meta name="twitter:description" content="Regional Canadian window and door dealers gain access to premium European systems, technical support, and project-level advisory." />
  <meta name="twitter:image" content="img/MDS-REALIZACJE.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: '#FBFBFB', obsidian: '#F9FAFB', graphite: '#F3F4F6', glass: '#9b8e68', frost: '#EAF7FA', silver: '#4D4D4D', line: 'rgba(0,0,0,0.1)', canvas: '#FBFBFB', charcoal: '#4D4D4D', darkheading: '#1A1A1A', accentblue: '#9b8e68' },
      fontFamily: { questrial: ['Montserrat', 'sans-serif'], montserrat: ['Montserrat', 'sans-serif'] },
      boxShadow: { glow: '0 0 25px rgba(107, 114, 128, 0.1)', glass: 'inset 0 0 18px rgba(255,255,255,0.7), 0 18px 60px rgba(0,0,0,0.06)' },
    } } };
  </script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="noise font-questrial">
  <div id="root"></div>

  <script src="shared.js" type="text/babel"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { TextReveal, GlassReveal, Header, Footer, BottomCTA } = window;

    function Hero() {
      return (
        <section className="relative bg-canvas min-h-[80vh] pt-32 pb-20 px-6">
          <div className="mx-auto max-w-7xl relative z-10">
            <div className="max-w-4xl">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">DEALER PARTNERSHIPS</p></TextReveal>
              <TextReveal delay={100}><h1 className="mt-5 text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-light leading-[1.05] tracking-wide sm:tracking-[0.12em] break-words text-[#4D4D4D]">Premium systems.<br/>Project-level support.</h1></TextReveal>
              <TextReveal delay={200}><div className="my-8 h-px w-16 bg-[#4D4D4D]/80"></div></TextReveal>
              <TextReveal delay={300}><p className="text-xl text-charcoal leading-relaxed font-medium">Crystal Ball partners with regional Canadian dealers who want access to high-performance European window, door, and facade systems — supplied by a team that supports the project, not just the order.</p></TextReveal>
              <TextReveal delay={400}>
                <div className="mt-10">
                  <a href="contact.html?inquiry=dealer" className="group relative inline-flex items-center justify-center overflow-hidden border border-darkheading px-8 py-4 text-[14px] font-bold tracking-[0.2em] uppercase outline-none">
                    <span className="absolute inset-0 bg-darkheading -translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.77,0,0.175,1)] group-hover:translate-x-0 z-0"></span>
                    <span className="relative z-10 text-darkheading group-hover:text-white transition-colors duration-500">APPLY FOR DEALER PARTNERSHIP</span>
                  </a>
                </div>
              </TextReveal>
            </div>

            <div className="mt-20 grid gap-12 md:grid-cols-2 items-center">
              <GlassReveal delay={300} className="relative h-[500px] w-full">
                <div className="h-full w-full border border-black/10 overflow-hidden shadow-xl">
                  <img src="img/MDS-REALIZACJE.jpg" className="absolute inset-0 h-full w-full object-cover" />
                </div>
              </GlassReveal>
              <div>
                <TextReveal delay={400}><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">WHO THIS IS FOR</p></TextReveal>
                <TextReveal delay={500}><h3 className="mt-3 text-3xl font-light text-[#4D4D4D] mb-6">Built for dealers who want to move upmarket.</h3></TextReveal>
                <TextReveal delay={600}><p className="text-[15px] leading-8 text-[#4D4D4D]/80 mb-6">You are an established regional dealer or contractor — residential, light commercial, or both. You are seeing project specifications that require:</p></TextReveal>
                <ul className="space-y-3">
                  {[
                    'Tilt & Turn or other European-style systems',
                    "Large-format glazing your current line can't support",
                    'Passive House or Net Zero performance requirements',
                    'Triple glazing, advanced thermal performance, or specialty hardware',
                    'Curtain wall or storefront on smaller commercial work',
                  ].map((t, i) => (
                    <TextReveal key={t} delay={700 + i * 70}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span>{t}</li></TextReveal>
                  ))}
                </ul>
                <TextReveal delay={1100}><p className="mt-8 text-[15px] font-bold text-[#1A1A1A]">Crystal Ball gives you the system access — and the technical backup — to win that work.</p></TextReveal>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // --- ALTERNATING-ROW PRIMITIVES (mirrors About + commercial-developers) ---
    function Row({ children, flip = false, bg = 'bg-canvas' }) {
      return (
        <section className={`${bg} w-full`}>
          <div className={`grid grid-cols-1 md:grid-cols-2 ${flip ? 'md:[direction:rtl]' : ''}`}>
            {children}
          </div>
        </section>
      );
    }
    function RowText({ children, bg = 'bg-canvas' }) {
      return (
        <div className={`${bg} md:[direction:ltr] px-6 md:px-14 py-12 md:py-20 flex flex-col justify-center`}>
          <div className="max-w-xl">{children}</div>
        </div>
      );
    }
    function RowImage({ src, alt = '', bg = 'bg-obsidian' }) {
      return (
        <div className={`${bg} md:[direction:ltr] grid p-8 md:p-0 min-h-[280px] md:min-h-[400px]`}>
          <div className="relative overflow-hidden">
            <img src={src} alt={alt} className="absolute inset-0 h-full w-full object-cover" />
          </div>
        </div>
      );
    }
    function SectionHeader({ eyebrow, title, intro, bg = 'bg-obsidian' }) {
      return (
        <section className={`${bg} border-t border-black/10 px-6 md:px-14 pt-20 md:pt-28 pb-10 md:pb-14`}>
          <div className="max-w-2xl">
            <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">{eyebrow}</p></TextReveal>
            <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">{title}</h2></TextReveal>
            {intro && <TextReveal delay={200}><p className="mt-6 text-[15px] leading-[1.8] text-[#4D4D4D]">{intro}</p></TextReveal>}
          </div>
        </section>
      );
    }
    function PillarNum({ children }) {
      return (
        <TextReveal>
          <div className="font-light text-[#9b8e68]/35 leading-none mb-3 tracking-tight text-[44px] md:text-[56px]">{children}</div>
        </TextReveal>
      );
    }
    function PillarTitle({ children, delay = 100 }) {
      return (
        <TextReveal delay={delay}>
          <h3 className="text-[13px] font-medium tracking-[0.04em] uppercase text-[#1A1A1A] mb-3">{children}</h3>
        </TextReveal>
      );
    }
    function PillarBody({ children, delay = 200 }) {
      return (
        <TextReveal delay={delay}>
          <p className="text-[14px] leading-[1.8] text-[#4D4D4D]">{children}</p>
        </TextReveal>
      );
    }

    // --- WHAT YOU GET (was: 5-card grid with 01-05) ---
    function WhatYouGet() {
      const items = [
        { title: 'System Access', body: 'Full Crystal Ball product range — high-performance windows, doors, curtain wall, custom configurations.', image: 'img/j-nadl-220-1620x1080.jpg.webp', alt: 'Crystal Ball system overview' },
        { title: 'Technical Guidance', body: 'Specification support, system selection, performance criteria translation — without you needing to build that capability in-house.', image: 'img/al_098.20-1852x1080.jpg.webp', alt: 'Technical detail of an aluminum window' },
        { title: 'Project-Level Advisory', body: 'When a project gets technical — thermal detailing, anchoring, sequencing — you have construction-experienced backup.', image: 'img/82-Wilson-Ave.-Kitchener-Ontario-1.jpeg', alt: '82 Wilson Ave project, Kitchener' },
        { title: 'Commercial Coordination', body: 'Quoting structure, lead time coordination, logistics planning.', image: 'img/81-Bay-St.-Toronto.jpg', alt: '81 Bay Street project, Toronto' },
        { title: 'Training & Documentation', body: 'Product training, technical literature, specification templates.', image: 'img/fiberglass-triple-glazed-windows-and-doors-800x500-1.jpg', alt: 'Technical documentation of a triple-glazed system' },
      ];
      return (
        <>
          <SectionHeader eyebrow="WHAT YOU GET" title="What the partnership includes." />
          {items.map((it, i) => {
            const textBg = i % 2 === 0 ? 'bg-obsidian' : 'bg-canvas';
            const imgBg = i % 2 === 0 ? 'bg-graphite' : 'bg-obsidian';
            return (
              <Row key={it.title} flip={i % 2 === 1} bg={textBg}>
                <RowText bg={textBg}>
                  <PillarNum>0{i + 1}</PillarNum>
                  <PillarTitle>{it.title}</PillarTitle>
                  <PillarBody>{it.body}</PillarBody>
                </RowText>
                <RowImage src={it.image} alt={it.alt} bg={imgBg} />
              </Row>
            );
          })}
        </>
      );
    }

    function HowItWorks() {
      const items = [
        'You own the customer relationship',
        'You manage the local quote and installation',
        'We provide systems, specification support, and project-level advisory',
        'We escalate only where supply or technical complexity requires it',
      ];
      return (
        <section className="bg-ink border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="grid gap-12 lg:grid-cols-2 items-start">
              <div>
                <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">HOW THE PARTNERSHIP WORKS</p></TextReveal>
                <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Strengthens you — not replaces you.</h2></TextReveal>
                <TextReveal delay={200}><p className="mt-6 text-[15px] leading-8 text-[#4D4D4D]/80">We do not compete with our dealers. Crystal Ball's role is to provide product access and technical support so regional dealers can deliver premium-tier projects they otherwise could not.</p></TextReveal>
              </div>
              <ul className="space-y-3">
                {items.map((t, i) => (
                  <TextReveal key={t} delay={i * 100}>
                    <li className="border-l-2 border-glass pl-5 py-3 text-[15px] font-medium text-[#4D4D4D] flex items-start"><span className="mr-3 mt-1 text-glass">■</span>{t}</li>
                  </TextReveal>
                ))}
              </ul>
            </div>
          </div>
        </section>
      );
    }

    function DealerProfile() {
      const items = [
        'Has an established regional presence — residential, commercial, or both',
        'Is already specifying mid- to high-performance windows and doors',
        "Wants access to systems the local market can't currently get",
        'Has installation capability (or trusted installer relationships)',
        'Is committed to the technical end of the product category — not just price competition',
      ];
      return (
        <section className="bg-obsidian border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="max-w-3xl mb-12">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">DEALER PROFILE</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Who we work with.</h2></TextReveal>
              <TextReveal delay={200}><p className="mt-6 text-[15px] leading-8 text-[#4D4D4D]/80">A typical Crystal Ball dealer:</p></TextReveal>
            </div>
            <ul className="grid gap-3 md:grid-cols-2 md:gap-x-12">
              {items.map((t, i) => (
                <TextReveal key={t} delay={i * 70}>
                  <li className="flex items-start text-[15px] font-medium text-[#4D4D4D] py-2"><span className="mr-3 mt-1 text-glass">■</span>{t}</li>
                </TextReveal>
              ))}
            </ul>
          </div>
        </section>
      );
    }

    function Markets() {
      const regions = ['Ontario', 'Quebec', 'Atlantic Canada', 'Prairie Provinces', 'British Columbia'];
      return (
        <section className="bg-ink border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="max-w-3xl mb-12">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">RECRUITING</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Where we're building dealer coverage.</h2></TextReveal>
              <TextReveal delay={200}><p className="mt-6 text-[16px] leading-7 text-[#4D4D4D]/80 font-medium">Crystal Ball is Ontario-based with structured national expansion underway. We are actively engaging dealer candidates across:</p></TextReveal>
            </div>
            <div className="flex flex-wrap gap-x-10 gap-y-4">
              {regions.map((r, i) => (
                <TextReveal key={r} delay={i * 80}>
                  <p className="text-[13px] font-bold tracking-[0.15em] text-[#1A1A1A] uppercase border-l-2 border-glass pl-4 py-1">{r}</p>
                </TextReveal>
              ))}
            </div>
            <TextReveal delay={500}><p className="mt-12 text-[16px] font-medium text-[#4D4D4D]">If you are in a market we don't yet cover — <span className="text-[#1A1A1A] font-bold">we want to talk.</span></p></TextReveal>
          </div>
        </section>
      );
    }

    function WhatWeDoNotDo() {
      const items = [
        'We do not undercut our dealers in their territory',
        'We do not run consumer marketing into dealer markets',
        'We do not promise unlimited exclusivity — territories are evaluated on capability and coverage',
        'We do not supply dealers we cannot support technically',
      ];
      return (
        <section className="bg-obsidian border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="max-w-3xl mb-12">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">WHAT WE DO NOT DO</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Where we draw the line.</h2></TextReveal>
              <TextReveal delay={200}><p className="mt-6 text-[15px] leading-8 text-[#4D4D4D]/80">So you know exactly what you're getting:</p></TextReveal>
            </div>
            <ul className="grid gap-3 md:grid-cols-2 md:gap-x-12">
              {items.map((t, i) => (
                <TextReveal key={t} delay={i * 80}>
                  <li className="flex items-start text-[15px] font-medium text-[#4D4D4D] py-2"><span className="mr-3 mt-1 text-glass">×</span>{t}</li>
                </TextReveal>
              ))}
            </ul>
            <TextReveal delay={500}><p className="mt-10 text-[16px] font-bold text-[#1A1A1A] max-w-3xl">This isn't a product catalog with a logo. It's a supply and advisory relationship.</p></TextReveal>
          </div>
        </section>
      );
    }

    // --- APPLICATION PROCESS (was: 3-card grid with big 01-03 numerals) ---
    function ApplicationProcess() {
      const steps = [
        { num: '01', title: 'Initial Inquiry', body: 'Submit the dealer inquiry form. Tell us about your market, current product lines, and the project types you want to win.', image: 'img/MDS-REALIZACJE.jpg', alt: 'Dealer inquiry context' },
        { num: '02', title: 'Conversation & Fit', body: 'We evaluate territory coverage, technical capability, and project pipeline alignment.', image: 'img/Forma-1.jpg', alt: 'Forma project facade' },
        { num: '03', title: 'Onboarding', body: 'Product training, documentation, technical contact assignment, and first-project support.', image: 'img/TERTIAIRES1-scaled-1.webp', alt: 'Architectural door onboarding context' },
      ];
      return (
        <>
          <SectionHeader eyebrow="APPLICATION PROCESS" title="How to apply." bg="bg-ink" />
          {steps.map((s, i) => {
            const textBg = i % 2 === 0 ? 'bg-ink' : 'bg-canvas';
            const imgBg = i % 2 === 0 ? 'bg-graphite' : 'bg-obsidian';
            return (
              <Row key={s.num} flip={i % 2 === 1} bg={textBg}>
                <RowText bg={textBg}>
                  <PillarNum>{s.num}</PillarNum>
                  <PillarTitle>{s.title}</PillarTitle>
                  <PillarBody>{s.body}</PillarBody>
                </RowText>
                <RowImage src={s.image} alt={s.alt} bg={imgBg} />
              </Row>
            );
          })}
        </>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <Header currentPage="markets" />
          <main className="min-h-screen">
            <Hero />
            <WhatYouGet />
            <HowItWorks />
            <DealerProfile />
            <Markets />
            <WhatWeDoNotDo />
            <ApplicationProcess />
            <BottomCTA />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
