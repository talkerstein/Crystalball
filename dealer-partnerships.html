  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: '#F2EDE9', obsidian: '#F9FAFB', graphite: '#F3F4F6', glass: '#6B7280', frost: '#EAF7FA', silver: '#4D4D4D', line: 'rgba(0,0,0,0.1)', canvas: '#F2EDE9', charcoal: '#4D4D4D', darkheading: '#1A1A1A', accentblue: '#6B7280' },
      fontFamily: { montserrat: ['Montserrat', 'sans-serif'] },
      boxShadow: { glow: '0 0 25px rgba(107, 114, 128, 0.1)', glass: 'inset 0 0 18px rgba(255,255,255,0.7), 0 18px 60px rgba(0,0,0,0.06)' },

<body class="noise font-montserrat">
  <div id="root"></div>

  <script src="shared.js" type="text/babel"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { TextReveal, GlassReveal, Header, Footer, BottomCTA } = window;

    function Hero() {
      return (
        <section className="relative bg-canvas min-h-[80vh] pt-32 pb-20 px-6">
          <div className="mx-auto max-w-7xl relative z-10">
            <div className="max-w-4xl">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">DEALER PARTNERSHIPS</p></TextReveal>
              <TextReveal delay={100}><h1 className="mt-5 text-5xl font-light leading-[1.05] tracking-[0.12em] md:text-7xl text-[#4D4D4D]">PREMIUM SYSTEMS.<br/>PROJECT-LEVEL<br/>SUPPORT.</h1></TextReveal>
              <TextReveal delay={200}><div className="my-8 h-1 w-16 bg-[#4D4D4D]/80"></div></TextReveal>
              <TextReveal delay={300}><p className="text-xl text-charcoal leading-relaxed font-medium">Crystal Ball partners with regional Canadian dealers who want access to high-performance European window, door, and facade systems — supplied by a team that supports the project, not just the order.</p></TextReveal>
              <TextReveal delay={400}>
                <div className="mt-10">
                  <a href="contact.html?inquiry=dealer" className="group relative inline-flex items-center justify-center overflow-hidden bg-darkheading px-8 py-4 text-[14px] font-bold tracking-[0.2em] text-white uppercase shadow-sm outline-none">
                    <span className="absolute inset-0 w-full h-full bg-charcoal -translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.77,0,0.175,1)] group-hover:translate-x-0 z-0"></span>
                    <span className="relative z-10">APPLY FOR DEALER PARTNERSHIP</span>
                  </a>
                </div>
              </TextReveal>
            </div>

            <div className="mt-20 grid gap-12 md:grid-cols-2 items-center">
              <GlassReveal delay={300} className="relative h-[500px] w-full">
                <div className="h-full w-full border border-black/10 overflow-hidden shadow-xl">
                  <img src="img/MDS-REALIZACJE.jpg" className="absolute inset-0 h-full w-full object-cover" />
                </div>
              </GlassReveal>
              <div>
                <TextReveal delay={400}><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">WHO THIS IS FOR</p></TextReveal>
                <TextReveal delay={500}><h3 className="mt-3 text-3xl font-light text-[#4D4D4D] mb-6">Built for dealers who want to move upmarket.</h3></TextReveal>
                <TextReveal delay={600}><p className="text-[15px] leading-8 text-[#4D4D4D]/80 mb-6">You are an established regional dealer or contractor — residential, light commercial, or both. You are seeing project specifications that require:</p></TextReveal>
                <ul className="space-y-3">
                  {[
                    'Tilt & Turn or other European-style systems',
                    "Large-format glazing your current line can't support",
                    'Passive House or Net Zero performance requirements',
                    'Triple glazing, advanced thermal performance, or specialty hardware',
                    'Curtain wall or storefront on smaller commercial work',
                  ].map((t, i) => (
                    <TextReveal key={t} delay={700 + i * 70}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span>{t}</li></TextReveal>
                  ))}
                </ul>
                <TextReveal delay={1100}><p className="mt-8 text-[15px] font-bold text-[#1A1A1A]">Crystal Ball gives you the system access — and the technical backup — to win that work.</p></TextReveal>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function WhatYouGet() {
      const items = [
        { title: 'System Access', body: 'Full Crystal Ball product range — high-performance windows, doors, curtain wall, custom configurations.' },
        { title: 'Technical Guidance', body: 'Specification support, system selection, performance criteria translation — without you needing to build that capability in-house.' },
        { title: 'Project-Level Advisory', body: 'When a project gets technical — thermal detailing, anchoring, sequencing — you have construction-experienced backup.' },
        { title: 'Commercial Coordination', body: 'Quoting structure, lead time coordination, logistics planning.' },
        { title: 'Training & Documentation', body: 'Product training, technical literature, specification templates.' },
      ];
      return (
        <section className="bg-obsidian border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="max-w-3xl mb-16">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">WHAT YOU GET</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">What the partnership includes.</h2></TextReveal>
            </div>
            <div className="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
              {items.map((it, i) => (
                <GlassReveal key={it.title} delay={i * 100} className="h-full">
                  <div className="h-full border border-black/10 bg-white p-8 hover:border-glass transition">
                    <p className="text-[12px] font-bold tracking-[0.2em] text-glass uppercase mb-4">0{i + 1}</p>
                    <h4 className="font-bold text-[#1A1A1A] tracking-wider mb-3">{it.title}</h4>
                    <p className="text-sm leading-6 text-[#4D4D4D]/80">{it.body}</p>
                  </div>
                </GlassReveal>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function HowItWorks() {
      const items = [
        'You own the customer relationship',
        'You manage the local quote and installation',
        'We provide systems, specification support, and project-level advisory',
        'We escalate only where supply or technical complexity requires it',
      ];
      return (
        <section className="bg-ink border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="grid gap-12 lg:grid-cols-2 items-start">
              <div>
                <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">HOW THE PARTNERSHIP WORKS</p></TextReveal>
                <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Strengthens you — not replaces you.</h2></TextReveal>
                <TextReveal delay={200}><p className="mt-6 text-[15px] leading-8 text-[#4D4D4D]/80">We do not compete with our dealers. Crystal Ball's role is to provide product access and technical support so regional dealers can deliver premium-tier projects they otherwise could not.</p></TextReveal>
              </div>
              <ul className="space-y-3">
                {items.map((t, i) => (
                  <TextReveal key={t} delay={i * 100}>
                    <li className="border-l-2 border-glass pl-5 py-3 text-[15px] font-medium text-[#4D4D4D] flex items-start"><span className="mr-3 mt-1 text-glass">■</span>{t}</li>
                  </TextReveal>
                ))}
              </ul>
            </div>
          </div>
        </section>
      );
    }

    function DealerProfile() {
      const items = [
        'Has an established regional presence — residential, commercial, or both',
        'Is already specifying mid- to high-performance windows and doors',
        "Wants access to systems the local market can't currently get",
        'Has installation capability (or trusted installer relationships)',
        'Is committed to the technical end of the product category — not just price competition',
      ];
      return (
        <section className="bg-obsidian border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="max-w-3xl mb-12">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">DEALER PROFILE</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Who we work with.</h2></TextReveal>
              <TextReveal delay={200}><p className="mt-6 text-[15px] leading-8 text-[#4D4D4D]/80">A typical Crystal Ball dealer:</p></TextReveal>
            </div>
            <ul className="grid gap-4 md:grid-cols-2">
              {items.map((t, i) => (
                <TextReveal key={t} delay={i * 70}>
                  <li className="border border-black/10 bg-white p-6 hover:border-glass transition text-[15px] font-medium text-[#4D4D4D] flex items-start"><span className="mr-3 mt-1 text-glass">■</span>{t}</li>
                </TextReveal>
              ))}
            </ul>
          </div>
        </section>
      );
    }

    function Markets() {
      const regions = ['Ontario', 'Quebec', 'Atlantic Canada', 'Prairie Provinces', 'British Columbia'];
      return (
        <section className="bg-ink border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="max-w-3xl mb-12">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">RECRUITING</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Where we're building dealer coverage.</h2></TextReveal>
              <TextReveal delay={200}><p className="mt-6 text-[16px] leading-7 text-[#4D4D4D]/80 font-medium">Crystal Ball is Ontario-based with structured national expansion underway. We are actively engaging dealer candidates across:</p></TextReveal>
            </div>
            <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-5">
              {regions.map((r, i) => (
                <GlassReveal key={r} delay={i * 80} className="h-full">
                  <div className="h-full border border-black/10 bg-white p-6 text-center hover:border-glass transition">
                    <p className="text-[13px] font-bold tracking-[0.15em] text-[#1A1A1A] uppercase">{r}</p>
                  </div>
                </GlassReveal>
              ))}
            </div>
            <TextReveal delay={500}><p className="mt-12 text-[16px] font-medium text-[#4D4D4D]">If you are in a market we don't yet cover — <span className="text-[#1A1A1A] font-bold">we want to talk.</span></p></TextReveal>
          </div>
        </section>
      );
    }

    function WhatWeDoNotDo() {
      const items = [
        'We do not undercut our dealers in their territory',
        'We do not run consumer marketing into dealer markets',
        'We do not promise unlimited exclusivity — territories are evaluated on capability and coverage',
        'We do not supply dealers we cannot support technically',
      ];
      return (
        <section className="bg-obsidian border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="max-w-3xl mb-12">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">WHAT WE DO NOT DO</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Where we draw the line.</h2></TextReveal>
              <TextReveal delay={200}><p className="mt-6 text-[15px] leading-8 text-[#4D4D4D]/80">So you know exactly what you're getting:</p></TextReveal>
            </div>
            <ul className="grid gap-4 md:grid-cols-2">
              {items.map((t, i) => (
                <TextReveal key={t} delay={i * 80}>
                  <li className="border border-black/10 bg-white p-6 hover:border-glass transition text-[15px] font-medium text-[#4D4D4D] flex items-start"><span className="mr-3 mt-1 text-glass">×</span>{t}</li>
                </TextReveal>
              ))}
            </ul>
            <TextReveal delay={500}><p className="mt-10 text-[16px] font-bold text-[#1A1A1A] max-w-3xl">This isn't a product catalog with a logo. It's a supply and advisory relationship.</p></TextReveal>
          </div>
        </section>
      );
    }

    function ApplicationProcess() {
      const steps = [
        { num: '01', title: 'Initial Inquiry', body: 'Submit the dealer inquiry form. Tell us about your market, current product lines, and the project types you want to win.' },
        { num: '02', title: 'Conversation & Fit', body: 'We evaluate territory coverage, technical capability, and project pipeline alignment.' },
        { num: '03', title: 'Onboarding', body: 'Product training, documentation, technical contact assignment, and first-project support.' },
      ];
      return (
        <section className="bg-ink border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="max-w-3xl mb-16">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">APPLICATION PROCESS</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">How to apply.</h2></TextReveal>
            </div>
            <div className="grid gap-6 md:grid-cols-3">
              {steps.map((s, i) => (
                <GlassReveal key={s.num} delay={i * 100} className="h-full">
                  <div className="h-full border border-black/10 bg-white p-8 hover:border-glass transition">
                    <p className="text-[48px] font-extralight text-glass leading-none">{s.num}</p>
                    <h4 className="mt-6 font-bold text-[#1A1A1A] tracking-wider mb-3">{s.title}</h4>
                    <p className="text-sm leading-6 text-[#4D4D4D]/80">{s.body}</p>
                  </div>
                </GlassReveal>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <Header currentPage="markets" />
          <main className="min-h-screen">
            <Hero />
            <WhatYouGet />
            <HowItWorks />
            <DealerProfile />
            <Markets />
            <WhatWeDoNotDo />
            <ApplicationProcess />
            <BottomCTA />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
