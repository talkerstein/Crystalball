  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: '#FBFBFB', obsidian: '#F9FAFB', graphite: '#F3F4F6', glass: '#9b8e68', frost: '#EAF7FA', silver: '#4D4D4D', line: 'rgba(0,0,0,0.1)', canvas: '#FBFBFB', charcoal: '#4D4D4D', darkheading: '#1A1A1A', accentblue: '#9b8e68' },
      fontFamily: { questrial: ['Montserrat', 'sans-serif'], montserrat: ['Montserrat', 'sans-serif'] },
      boxShadow: { glow: '0 0 25px rgba(107, 114, 128, 0.1)', glass: 'inset 0 0 18px rgba(255,255,255,0.7), 0 18px 60px rgba(0,0,0,0.06)' },
    } } };
  </script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="noise font-questrial">
  <div id="root"></div>

  <script src="shared.js" type="text/babel"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { TextReveal, Header, Footer, BottomCTA } = window;

    // --- HERO ---
    // Full-bleed dark hero. Image fills the section, dark gradient on
    // top so the eyebrow + h1 + sub-copy + button read cleanly on the
    // left. Sits behind the fixed Header (Header is z-50; hero content
    // is z-10).
    function AboutHero() {
      return (
        <section className="relative bg-darkheading min-h-[88vh] flex items-end overflow-hidden px-6 md:px-12 pt-32 pb-16 md:pb-20">
          <img
            src="img/market-custom-mountain-home.webp"
            alt="Modern Canadian custom home with European window and door systems"
            className="absolute inset-0 h-full w-full object-cover opacity-55"
          />
          <div className="absolute inset-0 bg-gradient-to-t from-black/85 via-black/30 to-transparent"></div>

          <div className="relative z-10 max-w-5xl">
            <TextReveal>
              <p className="text-[14px] font-medium tracking-[0.15em] text-white uppercase mb-4">About Crystal Ball</p>
            </TextReveal>
            <TextReveal delay={100}>
              <h1 className="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-light leading-tight text-white">
                European Performance.<br />Built on Canadian Standards.
              </h1>
            </TextReveal>
            <TextReveal delay={200}>
              <p className="mt-6 max-w-xl text-[15px] leading-[1.75] text-white/60">
                Crystal Ball supplies high-performance European facade systems to the Canadian market, backed by over two decades of commercial construction and building envelope experience.
              </p>
            </TextReveal>
            <TextReveal delay={300}>
              <a href="#vision" className="group relative mt-8 inline-flex items-center justify-center overflow-hidden border border-white px-7 py-3 text-[14px] leading-none tracking-[0.09em] uppercase outline-none">
                <span className="absolute inset-0 bg-white -translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.77,0,0.175,1)] group-hover:translate-x-0 z-0"></span>
                <span className="relative z-10 text-white group-hover:text-darkheading transition-colors duration-500">Our story</span>
              </a>
            </TextReveal>
          </div>
        </section>
      );
    }

    // --- ALTERNATING ROW PRIMITIVE ---
    // Each content row is full-bleed 2-col: text on one side, image on
    // the other. `flip` swaps so the image lands on the left. Text col
    // is internally padded; max-w on the inner block caps line length
    // on ultra-wide screens. Mobile collapses to a single column with
    // the image on top.
    function Row({ children, flip = false, bg = 'bg-canvas' }) {
      return (
        <section className={`${bg} w-full`}>
          <div className={`grid grid-cols-1 md:grid-cols-2 ${flip ? 'md:[direction:rtl]' : ''}`}>
            {React.Children.map(children, (child) =>
              React.isValidElement(child) ? React.cloneElement(child, { flip }) : child
            )}
          </div>
        </section>
      );
    }

    function RowText({ children, flip = false }) {
      // Outer (viewport-facing) padding mirrors the page's max-w-7xl
      // gutter so text aligns with the header logo + every other
      // max-w-7xl-bounded section on the page. Inner side keeps a
      // 56px buffer between text and the adjacent image. Below md the
      // standard 24px (1.5rem) gutter applies uniformly.
      //   flip=false -> text on visual LEFT  -> outer = padding-left
      //   flip=true  -> text on visual RIGHT -> outer = padding-right
      const padX = flip
        ? 'md:pr-[max(1.5rem,calc((100vw_-_80rem)/2_+_1.5rem))] md:pl-14'
        : 'md:pl-[max(1.5rem,calc((100vw_-_80rem)/2_+_1.5rem))] md:pr-14';
      return (
        <div className={`md:[direction:ltr] px-6 ${padX} py-16 md:py-24 flex flex-col justify-center`}>
          <div className="max-w-xl">
            {children}
          </div>
        </div>
      );
    }

    function RowImage({ src, alt = '', padded = false, flip = false }) {
      // Mobile: 32px padding all around (rows stack vertically).
      // md+: image is flush to the viewport edge on its outer side.
      //   flip=false -> image visually on RIGHT -> drop right padding
      //   flip=true  -> image visually on LEFT  -> drop left padding
      // Padded rows (Vision + Foundation) keep 80px on top/bottom + the
      // inner (text-facing) side. Non-padded rows have no md+ padding
      // (image fills the cell edge-to-edge in both directions).
      let padClass;
      if (padded) {
        padClass = flip
          ? 'p-8 md:py-20 md:pl-0 md:pr-20'
          : 'p-8 md:py-20 md:pr-0 md:pl-20';
      } else {
        padClass = 'p-8 md:p-0';
      }
      return (
        <div className={`md:[direction:ltr] grid ${padClass} min-h-[280px] md:min-h-[480px]`}>
          <div className="relative overflow-hidden">
            <img src={src} alt={alt} className="absolute inset-0 h-full w-full object-cover" />
          </div>
        </div>
      );
    }

    // --- SHARED BUILDING BLOCKS ---
    function Eyebrow({ children }) {
      return (
        <TextReveal>
          <p className="text-[14px] font-medium tracking-[0.15em] text-[#9b8e68] uppercase mb-4">{children}</p>
        </TextReveal>
      );
    }
    function SectionH2({ children, delay = 100 }) {
      return (
        <TextReveal delay={delay}>
          <h2 className="text-[22px] sm:text-[28px] md:text-[36px] font-light leading-tight text-[#1A1A1A] mb-5">{children}</h2>
        </TextReveal>
      );
    }
    // Lead and Body now render at the same size + weight. Per the
    // editorial direction, sections read as H2 -> body, not as
    // H2 -> oversized-lead -> body. Lead is kept as a separate
    // component name so the call sites stay semantically clear.
    function Body({ children, delay = 200 }) {
      return (
        <TextReveal delay={delay}>
          <p className="text-[14px] leading-[1.8] text-[#4D4D4D] mb-4 last:mb-0">{children}</p>
        </TextReveal>
      );
    }
    function Lead({ children, delay = 200 }) {
      return <Body delay={delay}>{children}</Body>;
    }
    function HairlineList({ items, delay = 300 }) {
      return (
        <TextReveal delay={delay}>
          <ul className="mt-5 mb-5">
            {items.map((item, i) => (
              <li
                key={i}
                className="relative py-2 pl-5 text-[14px] text-[#4D4D4D]"
              >
                <span className="absolute left-0 top-1/2 -translate-y-1/2 w-[7px] h-px bg-[#9b8e68]"></span>
                {item}
              </li>
            ))}
          </ul>
        </TextReveal>
      );
    }
    function PullQuote({ children, delay = 200 }) {
      return (
        <TextReveal delay={delay}>
          <blockquote className="border-l-[1.5px] border-[#9b8e68] pl-5 my-6 italic text-[16px] md:text-[20px] leading-[1.5] text-[#1A1A1A] font-light">
            {children}
          </blockquote>
        </TextReveal>
      );
    }

    // --- VISION ---
    function Vision() {
      return (
        <section className="bg-canvas px-6 py-20 md:py-28">
          <div className="mx-auto max-w-7xl grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-16 items-center">
            <div className="max-w-xl">
              <Eyebrow>Our Vision</Eyebrow>
              <SectionH2>Closing the gap between European engineering and Canadian execution.</SectionH2>
              <Lead>Crystal Ball was established to bridge advanced European manufacturing capacity with the evolving performance demands of the Canadian construction market.</Lead>
              <Body delay={200}>Our objective is direct: deliver premium-performance facade systems structured with commercial discipline and executed with real-world construction intelligence.</Body>
              <Body delay={300}>We serve commercial developers, general contractors, custom home builders, and regional dealer partners seeking high-performance systems supported by people who have built with them.</Body>
              <HairlineList
                delay={350}
                items={[
                  'High-performance European window and door systems',
                  'Architectural curtain wall and storefront assemblies',
                  'Facade-level technical and project support',
                  'Supply-only and supply-and-installation delivery models',
                ]}
              />
            </div>
            <div className="relative w-full aspect-[4/3] overflow-hidden">
              <img src="img/lifestyle-curtain-wall-interior.webp" alt="Curtain wall interior — Crystal Ball envelope systems" className="absolute inset-0 h-full w-full object-cover" />
            </div>
          </div>
        </section>
      );
    }

    // --- STATS STRIP ---
    // Dark band between Vision and Foundation. 4 stats, divider lines
    // between, no boxes. Number color matches the rest of the site
    // (white) with a gold accent on superscript markers; labels are
    // muted white.
    function StatsStrip() {
      const stats = [
        { n: '20', sup: '+', label: <>Years of curtain wall &amp;<br/>facade experience</> },
        { n: '4', label: <>Delivery models<br/>supply to full turn-key</> },
        { n: '5', label: <>Market segments<br/>served across Canada</> },
        { n: 'Pan-CA', small: true, label: <>Ontario-based.<br/>Serving projects across Canada.</> },
      ];
      return (
        <section className="bg-darkheading px-6 md:px-12 py-14 md:py-16">
          <div className="grid grid-cols-2 md:grid-cols-4">
            {stats.map((s, i) => (
              <TextReveal key={i} delay={i * 80}>
                <div className="px-4 md:px-8 py-5 md:py-0">
                  <div className={`font-light text-white leading-none mb-3 ${s.small ? 'text-[22px] md:text-[26px] tracking-tight pt-2' : 'text-[40px] md:text-[50px] tracking-tight'}`}>
                    {s.n}
                    {s.sup && <sup className="text-[0.42em] align-super text-[#9b8e68]">{s.sup}</sup>}
                  </div>
                  <div className="text-[14px] uppercase tracking-[0.05em] text-white/40 leading-[1.55]">
                    {s.label}
                  </div>
                </div>
              </TextReveal>
            ))}
          </div>
        </section>
      );
    }

    // --- FOUNDATION ---
    function Foundation() {
      return (
        <section className="bg-obsidian px-6 py-20 md:py-28">
          <div className="mx-auto max-w-7xl grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-16 items-center">
            <div className="relative w-full aspect-[4/3] overflow-hidden">
              <img src="img/market-custom-interior.webp" alt="Crystal Ball envelope installation — interior view" className="absolute inset-0 h-full w-full object-cover" />
            </div>
            <div className="max-w-xl md:ml-auto">
              <Eyebrow>Our Foundation</Eyebrow>
              <SectionH2>Two Decades of Envelope Expertise</SectionH2>
              <Lead>Crystal Ball is led by a senior construction professional with over 20 years of direct experience across Canada's most demanding building envelope projects.</Lead>
              <PullQuote delay={200}>
                "We don't simply supply windows — we support the building envelope from concept to completion."
              </PullQuote>
              <HairlineList
                delay={300}
                items={[
                  'Curtain wall and commercial facade systems',
                  'High-rise and mixed-use developments',
                  'Large-scale restoration and retrofit programs',
                  'International building envelope coordination',
                  'Passive House and Net Zero projects',
                  'LEED-certified developments',
                ]}
              />
            </div>
          </div>
        </section>
      );
    }

    // --- WHY CRYSTAL BALL ---
    function WhyCrystalBall() {
      const items = [
        {
          n: '01',
          title: 'European Engineering Standards',
          body: 'Our systems are built on advanced European platform technologies — superior thermal performance, multi-chamber profiles, triple-glazing capability, and air and water performance exceeding typical Canadian code minimums.',
          image: 'img/lifestyle-arched-window.webp',
          alt: 'Aluminum profile detail',
        },
        {
          n: '02',
          title: 'Materials Selection That Creates Solutions',
          body: 'We supply a broad range of systems — high-performance aluminum, advanced uPVC, composite fiberglass, and large-span glazing assemblies — allowing us to match solutions to performance, budget, and architectural intent.',
          image: 'img/lifestyle-facade-sunset.webp',
          alt: 'Fiberglass triple-glazed window assembly',
        },
        {
          n: '03',
          title: 'Intelligent Global Sourcing',
          body: 'Through established European manufacturing relationships built over two decades, Crystal Ball provides access to stable production capacity and consistent quality control without inflated cost structures. Our clients benefit from premium systems at competitive positioning.',
          image: 'img/lifestyle-modern-entry-door.webp',
          alt: 'Modern front entry door system',
        },
        {
          n: '04',
          title: 'Project-Level Expertise',
          body: 'We bring sequencing awareness, site logistics understanding, structural coordination knowledge, and envelope continuity experience to every engagement. We understand how systems perform — not only in the lab, but on site, in Canadian conditions.',
          image: 'img/82-Wilson-Ave.-Kitchener-Ontario-1.jpeg',
          alt: '82 Wilson Ave., Kitchener — Crystal Ball custom residential project',
        },
        {
          n: '05',
          title: 'Installation Knowledge That Protects Performance',
          body: 'System performance depends on proper execution. Our approach ensures correct anchoring strategies, thermal continuity, air and water integrity, and field-ready detailing — preserving performance from factory to final inspection.',
          image: 'img/lifestyle-modern-facade.webp',
          alt: 'Window installation detail',
        },
      ];
      return (
        <section className="bg-obsidian px-6 py-20 md:py-28">
          <div className="mx-auto max-w-7xl">
            <div className="max-w-2xl mb-12 md:mb-16">
              <TextReveal><p className="text-[14px] font-medium tracking-[0.15em] text-[#9b8e68] uppercase mb-4">WHY CRYSTAL BALL</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">More than a supplier.<br/>A construction partner.</h2></TextReveal>
              <TextReveal delay={200}><p className="mt-6 text-[15px] leading-[1.8] text-[#4D4D4D]">Unlike typical window suppliers, Crystal Ball operates with the intelligence of a construction company. Our systems are selected, evaluated, and supported through the lens of real-world project execution — not just product specification.</p></TextReveal>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 md:gap-12">
              {items.map((it, i) => (
                <TextReveal key={it.title} delay={(i % 3) * 100}>
                  <div className="flex flex-col h-full">
                    <div className="relative w-full aspect-[3/2] overflow-hidden mb-6">
                      <img src={it.image} alt={it.alt} className="absolute inset-0 h-full w-full object-cover transition duration-700 hover:scale-105" />
                    </div>
                    <div className="font-light text-[#9b8e68]/35 leading-none mb-2 tracking-tight text-[36px] md:text-[44px]">{it.n}</div>
                    <h3 className="text-xl md:text-2xl font-light leading-tight text-[#1A1A1A] mb-3">{it.title}</h3>
                    <p className="text-[14px] leading-7 text-[#4D4D4D]/85">{it.body}</p>
                  </div>
                </TextReveal>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <Header currentPage="about" />
          <main className="min-h-screen">
            <AboutHero />
            <div id="vision" className="scroll-mt-24">
              <Vision />
            </div>
            <StatsStrip />
            <div id="foundation" className="scroll-mt-24">
              <Foundation />
            </div>
            <div id="why" className="scroll-mt-24">
              <WhyCrystalBall />
            </div>
            <BottomCTA />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
