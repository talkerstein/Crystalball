<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Crystal Ball | European Facade Systems Built on Construction Experience</title>
  <meta name="description" content="Crystal Ball was founded to bridge European manufacturing capacity with Canadian construction performance demands. Led by 20+ years of curtain wall, envelope, and Passive House experience." />

  <link rel="icon" type="image/png" href="img/Crystal-Ball-Full-Color-Vertical-scaled.png" />
  <link rel="apple-touch-icon" href="img/Crystal-Ball-Full-Color-Vertical-scaled.png" />
  <link rel="canonical" href="https://curious-concha-f11e49.netlify.app/about.html" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Crystal Ball Windows & Doors" />
  <meta property="og:title" content="About Crystal Ball | European Facade Systems Built on Construction Experience" />
  <meta property="og:description" content="Crystal Ball was founded to bridge European manufacturing capacity with Canadian construction performance demands. Led by 20+ years of curtain wall, envelope, and Passive House experience." />
  <meta property="og:image" content="img/Crystal-Ball-Hero-scaled.webp" />
  <meta property="og:url" content="https://curious-concha-f11e49.netlify.app/about.html" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="About Crystal Ball" />
  <meta name="twitter:description" content="Crystal Ball was founded to bridge European manufacturing capacity with Canadian construction performance demands." />
  <meta name="twitter:image" content="img/Crystal-Ball-Hero-scaled.webp" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: '#FBFBFB', obsidian: '#F9FAFB', graphite: '#F3F4F6', glass: '#9b8e68', frost: '#EAF7FA', silver: '#4D4D4D', line: 'rgba(0,0,0,0.1)', canvas: '#FBFBFB', charcoal: '#4D4D4D', darkheading: '#1A1A1A', accentblue: '#9b8e68' },
      fontFamily: { questrial: ['Montserrat', 'sans-serif'], montserrat: ['Montserrat', 'sans-serif'] },
      boxShadow: { glow: '0 0 25px rgba(107, 114, 128, 0.1)', glass: 'inset 0 0 18px rgba(255,255,255,0.7), 0 18px 60px rgba(0,0,0,0.06)' },
    } } };
  </script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="noise font-questrial">
  <div id="root"></div>

  <script src="shared.js" type="text/babel"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { TextReveal, Header, Footer, BottomCTA } = window;

    // --- HERO ---
    // Full-bleed dark hero. Image fills the section, dark gradient on
    // top so the eyebrow + h1 + sub-copy + button read cleanly on the
    // left. Sits behind the fixed Header (Header is z-50; hero content
    // is z-10).
    function AboutHero() {
      return (
        <section className="relative bg-darkheading min-h-[88vh] flex items-end overflow-hidden px-6 md:px-12 pt-32 pb-16 md:pb-20">
          <img
            src="img/81-Bay-St.-Toronto.jpg"
            alt="Crystal Ball commercial facade installation — 81 Bay St., Toronto"
            className="absolute inset-0 h-full w-full object-cover opacity-55"
          />
          <div className="absolute inset-0 bg-gradient-to-t from-black/85 via-black/30 to-transparent"></div>

          <div className="relative z-10 max-w-2xl">
            <TextReveal>
              <p className="text-[11px] font-medium tracking-[0.15em] text-white uppercase mb-4">About Crystal Ball</p>
            </TextReveal>
            <TextReveal delay={100}>
              <h1 className="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-light leading-[1.15] tracking-tight text-white">
                European performance.<br />Built on Canadian construction reality.
              </h1>
            </TextReveal>
            <TextReveal delay={200}>
              <p className="mt-6 max-w-xl text-[15px] leading-[1.75] text-white/60">
                Crystal Ball supplies high-performance European facade systems to the Canadian market, backed by over two decades of commercial construction and building envelope experience.
              </p>
            </TextReveal>
            <TextReveal delay={300}>
              <a href="#vision" className="mt-8 inline-block border border-white/50 text-white hover:bg-white/10 transition px-7 py-3 text-[11px] tracking-[0.09em] uppercase rounded-full">
                Our story
              </a>
            </TextReveal>
          </div>
        </section>
      );
    }

    // --- ALTERNATING ROW PRIMITIVE ---
    // Each content row is full-bleed 2-col: text on one side, image on
    // the other. `flip` swaps so the image lands on the left. Text col
    // is internally padded; max-w on the inner block caps line length
    // on ultra-wide screens. Mobile collapses to a single column with
    // the image on top.
    function Row({ children, flip = false, bg = 'bg-canvas' }) {
      return (
        <section className={`${bg} w-full`}>
          <div className={`grid grid-cols-1 md:grid-cols-2 ${flip ? 'md:[direction:rtl]' : ''}`}>
            {children}
          </div>
        </section>
      );
    }

    function RowText({ children, bg = 'bg-canvas' }) {
      return (
        <div className={`${bg} md:[direction:ltr] px-6 md:px-14 py-16 md:py-24 flex flex-col justify-center`}>
          <div className="max-w-xl">
            {children}
          </div>
        </div>
      );
    }

    function RowImage({ src, alt = '', bg = 'bg-obsidian' }) {
      return (
        <div className={`${bg} md:[direction:ltr] relative min-h-[280px] md:min-h-[480px] overflow-hidden`}>
          <img src={src} alt={alt} className="absolute inset-0 h-full w-full object-cover" />
        </div>
      );
    }

    // --- SHARED BUILDING BLOCKS ---
    function Eyebrow({ children }) {
      return (
        <TextReveal>
          <p className="text-[11px] font-medium tracking-[0.15em] text-[#9b8e68] uppercase mb-4">{children}</p>
        </TextReveal>
      );
    }
    function SectionH2({ children, delay = 100 }) {
      return (
        <TextReveal delay={delay}>
          <h2 className="text-[22px] sm:text-[28px] md:text-[36px] font-light leading-[1.2] tracking-tight text-[#1A1A1A] mb-5">{children}</h2>
        </TextReveal>
      );
    }
    function Lead({ children, delay = 200 }) {
      return (
        <TextReveal delay={delay}>
          <p className="text-[15px] md:text-[17px] leading-[1.8] text-[#4D4D4D] mb-5">{children}</p>
        </TextReveal>
      );
    }
    function Body({ children, delay = 200 }) {
      return (
        <TextReveal delay={delay}>
          <p className="text-[14px] leading-[1.8] text-[#4D4D4D] mb-4 last:mb-0">{children}</p>
        </TextReveal>
      );
    }
    function HairlineList({ items, delay = 300 }) {
      return (
        <TextReveal delay={delay}>
          <ul className="mt-5 mb-5">
            {items.map((item, i) => (
              <li
                key={i}
                className="relative py-2 pl-5 text-[14px] text-[#4D4D4D] border-b border-black/[0.07] last:border-b-0"
              >
                <span className="absolute left-0 top-1/2 -translate-y-1/2 w-[7px] h-px bg-[#9b8e68]"></span>
                {item}
              </li>
            ))}
          </ul>
        </TextReveal>
      );
    }
    function PullQuote({ children, delay = 200 }) {
      return (
        <TextReveal delay={delay}>
          <blockquote className="border-l-[1.5px] border-[#9b8e68] pl-5 my-6 italic text-[16px] md:text-[20px] leading-[1.5] text-[#1A1A1A] font-light">
            {children}
          </blockquote>
        </TextReveal>
      );
    }

    // --- VISION ---
    function Vision() {
      return (
        <Row bg="bg-canvas">
          <RowText bg="bg-canvas">
            <Eyebrow>Our Vision</Eyebrow>
            <SectionH2>Closing the gap between European engineering and Canadian execution.</SectionH2>
            <Lead>Crystal Ball was established to bridge advanced European manufacturing capacity with the evolving performance demands of the Canadian construction market.</Lead>
            <Body delay={200}>Our objective is direct: deliver premium-performance facade systems structured with commercial discipline and executed with real-world construction intelligence.</Body>
            <Body delay={300}>We serve commercial developers, general contractors, custom home builders, and regional dealer partners seeking high-performance systems supported by people who have built with them.</Body>
            <HairlineList
              delay={350}
              items={[
                'High-performance European window and door systems',
                'Architectural curtain wall and storefront assemblies',
                'Facade-level technical and project support',
                'Supply-only and supply-and-installation delivery models',
              ]}
            />
          </RowText>
          <RowImage
            src="img/Forma-1.jpg"
            alt="Forma at 266 King St. W. — Crystal Ball curtain wall, Toronto"
            bg="bg-obsidian"
          />
        </Row>
      );
    }

    // --- STATS STRIP ---
    // Dark band between Vision and Foundation. 4 stats, divider lines
    // between, no boxes. Number color matches the rest of the site
    // (white) with a gold accent on superscript markers; labels are
    // muted white.
    function StatsStrip() {
      const stats = [
        { n: '20', sup: '+', label: <>Years of curtain wall &amp;<br/>facade experience</> },
        { n: '4', label: <>Delivery models<br/>supply to full turn-key</> },
        { n: '5', label: <>Market segments<br/>served across Canada</> },
        { n: 'Pan-CA', small: true, label: <>Ontario-based.<br/>Serving projects across Canada.</> },
      ];
      return (
        <section className="bg-darkheading px-6 md:px-12 py-14 md:py-16">
          <div className="grid grid-cols-2 md:grid-cols-4">
            {stats.map((s, i) => (
              <TextReveal key={i} delay={i * 80}>
                <div className={`px-4 md:px-8 py-5 md:py-0 ${i < stats.length - 1 ? 'md:border-r md:border-white/10' : ''} ${i < 2 && 'border-b border-white/10 md:border-b-0'}`}>
                  <div className={`font-light text-white leading-none mb-3 ${s.small ? 'text-[22px] md:text-[26px] tracking-tight pt-2' : 'text-[40px] md:text-[50px] tracking-tight'}`}>
                    {s.n}
                    {s.sup && <sup className="text-[0.42em] align-super text-[#9b8e68]">{s.sup}</sup>}
                  </div>
                  <div className="text-[11px] uppercase tracking-[0.05em] text-white/40 leading-[1.55]">
                    {s.label}
                  </div>
                </div>
              </TextReveal>
            ))}
          </div>
        </section>
      );
    }

    // --- FOUNDATION ---
    function Foundation() {
      return (
        <Row flip bg="bg-obsidian">
          <RowText bg="bg-obsidian">
            <Eyebrow>Our Foundation</Eyebrow>
            <SectionH2>Led by construction.<br/>Informed by experience.</SectionH2>
            <Lead>Crystal Ball is led by a senior construction professional with over 20 years of direct experience across Canada's most demanding building envelope projects.</Lead>
            <PullQuote delay={200}>
              "We don't simply supply windows — we support the building envelope from concept to completion."
            </PullQuote>
            <HairlineList
              delay={300}
              items={[
                'Curtain wall and commercial facade systems',
                'High-rise and mixed-use developments',
                'Large-scale restoration and retrofit programs',
                'International building envelope coordination',
                'Passive House and Net Zero projects',
                'LEED-certified developments',
              ]}
            />
          </RowText>
          <RowImage
            src="img/Woodbine-Casino-Resort-Toronto-1-.jpg"
            alt="Crystal Ball facade installation — Woodbine Casino Resort, Toronto"
            bg="bg-graphite"
          />
        </Row>
      );
    }

    // --- WHY CRYSTAL BALL INTRO ---
    function WhyIntro() {
      return (
        <section className="bg-obsidian px-6 md:px-14 pt-20 md:pt-24 pb-10 md:pb-12">
          <div className="max-w-xl">
            <Eyebrow>Why Crystal Ball</Eyebrow>
            <SectionH2>More than a distributor.<br/>A construction partner.</SectionH2>
            <Lead>Unlike typical window suppliers, Crystal Ball operates with the intelligence of a construction company. Our systems are selected, evaluated, and supported through the lens of real-world project execution — not just product specification.</Lead>
          </div>
        </section>
      );
    }

    // --- PILLAR ROW ---
    // Big numbered section. Number is intentionally larger than the
    // pillar heading underneath (per the reference), with the number
    // rendered in a faded gold tone so it reads as visual scaffolding
    // rather than emphasis. Heading is a small uppercase label
    // (smaller than h2). Optional pull quote slot at the bottom.
    function PillarRow({ number, title, body, pullQuote, image, alt, flip, textBg, imgBg }) {
      return (
        <Row flip={flip} bg={textBg}>
          <RowText bg={textBg}>
            <TextReveal>
              <div className="font-light text-[#9b8e68]/35 leading-none mb-3 tracking-tight text-[56px] md:text-[72px]">
                {number}
              </div>
            </TextReveal>
            <TextReveal delay={100}>
              <h3 className="text-[13px] font-medium tracking-[0.04em] uppercase text-[#1A1A1A] mb-3">
                {title}
              </h3>
            </TextReveal>
            <TextReveal delay={200}>
              <p className="text-[14px] leading-[1.8] text-[#4D4D4D]">{body}</p>
            </TextReveal>
            {pullQuote && <PullQuote delay={300}>{pullQuote}</PullQuote>}
          </RowText>
          <RowImage src={image} alt={alt} bg={imgBg} />
        </Row>
      );
    }

    function Pillars() {
      const pillars = [
        {
          n: '01',
          title: 'European Engineering Standards',
          body: 'Our systems are built on advanced European platform technologies — superior thermal performance, multi-chamber profiles, triple-glazing capability, and air and water performance exceeding typical Canadian code minimums.',
          image: 'img/al_063.20-1920x1040.jpg.webp',
          alt: 'Aluminum profile detail',
        },
        {
          n: '02',
          title: 'Materials Selection That Creates Solutions',
          body: 'We supply a broad range of systems — high-performance aluminum, advanced uPVC, composite fiberglass, and large-span glazing assemblies — allowing us to match solutions to performance, budget, and architectural intent.',
          image: 'img/fiberglass-triple-glazed-windows-and-doors-800x500-1.jpg',
          alt: 'Fiberglass triple-glazed window assembly',
        },
        {
          n: '03',
          title: 'Intelligent Global Sourcing',
          body: 'Through established European manufacturing relationships built over two decades, Crystal Ball provides access to stable production capacity and consistent quality control without inflated cost structures. Our clients benefit from premium systems at competitive positioning.',
          image: 'img/j-nadl-220-1620x1080.jpg.webp',
          alt: 'European aluminum window system',
        },
        {
          n: '04',
          title: 'Project-Level Expertise',
          body: 'We bring sequencing awareness, site logistics understanding, structural coordination knowledge, and envelope continuity experience to every engagement. We understand how systems perform — not only in the lab, but on site, in Canadian conditions.',
          image: 'img/82-Wilson-Ave.-Kitchener-Ontario-1.jpeg',
          alt: '82 Wilson Ave., Kitchener — Crystal Ball custom residential project',
        },
        {
          n: '05',
          title: 'Installation Knowledge That Protects Performance',
          body: 'System performance depends on proper execution. Our approach ensures correct anchoring strategies, thermal continuity, air and water integrity, and field-ready detailing — preserving performance from factory to final inspection.',
          pullQuote: '"Performance is preserved from factory to final inspection."',
          image: 'img/al_098.20-1852x1080.jpg.webp',
          alt: 'Window installation detail',
        },
      ];

      // Alternate text background between obsidian and canvas so adjacent
      // rows read as distinct without changing image position rhythm.
      // Flip the image side every other row (image right, then left).
      return (
        <>
          {pillars.map((p, i) => (
            <PillarRow
              key={p.n}
              number={p.n}
              title={p.title}
              body={p.body}
              pullQuote={p.pullQuote}
              image={p.image}
              alt={p.alt}
              flip={i % 2 === 1}
              textBg={i % 2 === 0 ? 'bg-obsidian' : 'bg-canvas'}
              imgBg={i % 2 === 0 ? 'bg-graphite' : 'bg-obsidian'}
            />
          ))}
        </>
      );
    }

    // --- HOW WE OPERATE ---
    function HowWeOperate() {
      return (
        <Row flip bg="bg-canvas">
          <RowText bg="bg-canvas">
            <Eyebrow>How We Operate</Eyebrow>
            <SectionH2>Structured for execution.<br/>Supported from design to delivery.</SectionH2>
            <Lead>Crystal Ball supports facade projects from initial design through to post-installation — as a coordinated project partner, not a product catalogue.</Lead>
            <HairlineList
              delay={250}
              items={[
                'Design assistance and early-stage collaboration',
                'System selection and technical specification',
                'Supply coordination and delivery management',
                'Installation oversight and field coordination',
                'Post-installation support and performance review',
              ]}
            />
            <Body delay={350}>For builders with established installation teams, we deliver supply-only with full technical support. For clients requiring single-point responsibility, Crystal Ball offers complete turn-key delivery executed under our quality standards.</Body>
            <TextReveal delay={450}>
              <a href="contact.html" className="mt-6 inline-block border border-[#1A1A1A] text-[#1A1A1A] hover:bg-[#1A1A1A] hover:text-white transition px-7 py-3 text-[11px] tracking-[0.09em] uppercase rounded-full">
                Start a conversation
              </a>
            </TextReveal>
          </RowText>
          <RowImage
            src="img/jedraszek-best-391-1620x1080.jpg.webp"
            alt="Crystal Ball window system — hardware and frame detail"
            bg="bg-obsidian"
          />
        </Row>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <Header currentPage="about" />
          <main className="min-h-screen">
            <AboutHero />
            <div id="vision">
              <Vision />
              <StatsStrip />
              <Foundation />
            </div>
            <div id="why">
              <WhyIntro />
              <Pillars />
            </div>
            <div id="how">
              <HowWeOperate />
            </div>
            <BottomCTA />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
