<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Crystal Ball Windows & Doors | Project Experience Across Canada</title>
  <meta name="description" content="Crystal Ball's project experience includes low-rise residential, Passive House, commercial tower, hospitality, and facade project management work across Ontario." />

  <link rel="icon" type="image/png" href="img/Crystal-Ball-Full-Color-Vertical-scaled.png" />
  <link rel="apple-touch-icon" href="img/Crystal-Ball-Full-Color-Vertical-scaled.png" />
  <link rel="canonical" href="https://curious-concha-f11e49.netlify.app/portfolio.html" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Crystal Ball Windows & Doors" />
  <meta property="og:title" content="Portfolio | Crystal Ball Windows & Doors | Project Experience Across Canada" />
  <meta property="og:description" content="Crystal Ball's project experience includes low-rise residential, Passive House, commercial tower, hospitality, and facade project management work across Ontario." />
  <meta property="og:image" content="img/project-forma-266-king.jpg" />
  <meta property="og:url" content="https://curious-concha-f11e49.netlify.app/portfolio.html" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Portfolio | Crystal Ball" />
  <meta name="twitter:description" content="Low-rise residential, Passive House, commercial tower, hospitality, and facade project management experience." />
  <meta name="twitter:image" content="img/project-forma-266-king.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: '#FBFBFB', obsidian: '#F9FAFB', graphite: '#F3F4F6', glass: '#9b8e68', frost: '#EAF7FA', silver: '#4D4D4D', line: 'rgba(0,0,0,0.1)', canvas: '#FBFBFB', charcoal: '#4D4D4D', darkheading: '#1A1A1A', accentblue: '#9b8e68' },
      fontFamily: { questrial: ['Montserrat', 'sans-serif'], montserrat: ['Montserrat', 'sans-serif'] },
      boxShadow: { glow: '0 0 25px rgba(107, 114, 128, 0.1)', glass: 'inset 0 0 18px rgba(255,255,255,0.7), 0 18px 60px rgba(0,0,0,0.06)' },
    } } };
  </script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="noise font-questrial">
  <div id="root"></div>

  <script src="shared.js" type="text/babel"></script>

  <script type="text/babel">
    function PortfolioHero() {
      return (
        <section className="relative bg-darkheading min-h-[80vh] flex items-end overflow-hidden px-6 md:px-12 pt-32 pb-16 md:pb-20">
          <img
            src="img/project-forma-266-king.jpg"
            alt="Forma — Crystal Ball curtain wall at 266 King St. W., Toronto"
            className="absolute inset-0 h-full w-full object-cover opacity-55"
          />
          <div className="absolute inset-0 bg-gradient-to-t from-black/85 via-black/30 to-transparent"></div>

          <div className="relative z-10 max-w-3xl">
            <TextReveal>
              <p className="text-[14px] font-medium tracking-[0.15em] text-white uppercase mb-4">Portfolio</p>
            </TextReveal>
            <TextReveal delay={100}>
              <h1 className="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-light leading-tight text-white">
                European Performance.<br/>Delivered with Project Intelligence.
              </h1>
            </TextReveal>
            <TextReveal delay={200}>
              <p className="mt-6 max-w-xl text-[15px] leading-[1.75] text-white/60">
                Crystal Ball supplies high-performance aluminum window, door, and facade systems to the Canadian market, combining advanced engineering with over two decades of building envelope and curtain wall expertise.
              </p>
            </TextReveal>
            <TextReveal delay={300}>
              <a href="#projects" className="group relative mt-8 inline-flex items-center justify-center overflow-hidden border border-white px-7 py-3 text-[14px] leading-none tracking-[0.09em] uppercase outline-none">
                <span className="absolute inset-0 bg-white -translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.77,0,0.175,1)] group-hover:translate-x-0 z-0"></span>
                <span className="relative z-10 text-white group-hover:text-darkheading transition-colors duration-500">Explore projects</span>
              </a>
            </TextReveal>
          </div>
        </section>
      );
    }

    function PortfolioPage() {
      const { TextReveal, GlassReveal, BottomCTA } = window;
      const [activeFilter, setActiveFilter] = React.useState('All');

      const filters = ['All', 'Low-Rise Residential', 'Commercial'];

      const filteredProjects = activeFilter === 'All'
        ? window.showcaseProjects
        : window.showcaseProjects.filter(p => p.type === activeFilter);

      return (
        <section id="projects" className="relative bg-canvas pt-20 md:pt-28 pb-20 px-6 z-10">
          <div className="mx-auto max-w-7xl relative z-10">

            {/* Filter Bar */}
            <TextReveal delay={400} className="w-full mb-12">
              <div className="flex flex-wrap gap-2 py-4">
                {filters.map((filter) => (
                  <button
                    key={filter}
                    onClick={() => setActiveFilter(filter)}
                    className={`px-5 py-3 text-[14px] font-bold tracking-[0.2em] uppercase border transition outline-none ${activeFilter === filter ? 'bg-[#1A1A1A] border-[#1A1A1A] text-white' : 'border-black/15 text-charcoal hover:border-glass hover:text-darkheading'}`}
                  >
                    {filter}
                  </button>
                ))}
              </div>
            </TextReveal>

            {/* Projects List */}
            <div className="grid gap-12">
              {filteredProjects.map((project, i) => (
                <GlassReveal key={project.id} delay={(i % 3) * 100}>
                  <div id={project.id} className="grid md:grid-cols-[1fr_1.2fr] gap-8 items-center p-6 md:p-10 transition scroll-mt-24">
                    <div className="h-[300px] md:h-[400px] w-full overflow-hidden relative">
                      <img src={project.image} className="absolute inset-0 h-full w-full object-cover transition duration-700 hover:scale-105" alt={project.title} />
                    </div>
                    <div className="flex flex-col justify-center h-full">
                      <h3 className="text-3xl font-light text-[#1A1A1A] mb-2">{project.title}</h3>

                      {/* Metadata Row */}
                      <p className="text-[14px] font-bold tracking-[0.1em] text-[#4D4D4D]/60 uppercase mb-6">
                        {[project.location, project.type, project.year].filter(Boolean).join(' • ')}
                      </p>

                      {/* Specifications */}
                      <div className="space-y-3 mb-8">
                        <p className="text-[14px] text-[#4D4D4D]"><strong className="text-[#1A1A1A] font-bold">Role / scope:</strong> {project.scope || 'Windows, Doors, Curtain Wall'}</p>
                        <p className="text-[14px] text-[#4D4D4D]"><strong className="text-[#1A1A1A] font-bold">Performance criteria:</strong> {project.criteria || 'Passive House, Net Zero, OBC'}</p>
                        <p className="text-[15px] leading-7 text-[#4D4D4D]/80 pt-4 mt-4">{project.description}</p>
                      </div>
                    </div>
                  </div>
                </GlassReveal>
              ))}
            </div>

            {filteredProjects.length === 0 && (
              <div className="text-center py-20">
                <p className="text-[14px] text-[#4D4D4D]/70 font-medium">No projects in this category yet.</p>
              </div>
            )}

          </div>
        </section>
      );
    }

    function App() {
      const { Header, Footer, BottomCTA } = window;
      return (
        <React.Fragment>
          <Header currentPage="portfolio" />
          <main className="min-h-screen">
            <PortfolioHero />
            <PortfolioPage />
            <BottomCTA />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
