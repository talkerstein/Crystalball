  <script src="shared.js" type="text/babel"></script>

  <script type="text/babel">

              <div className="mt-10">
                <a href="contact.html?inquiry=commercial" className="inline-block border border-darkheading bg-darkheading px-8 py-4 text-[13px] font-bold tracking-[0.2em] text-white hover:bg-charcoal transition uppercase shadow-sm">Request a Project Consultation →</a>
