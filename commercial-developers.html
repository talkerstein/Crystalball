<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commercial Facade Systems | Curtain Wall, Windows & Doors for Canadian Developers</title>
  <meta name="description" content="European-engineered facade systems for commercial developers, general contractors, and construction managers. Curtain wall, high-performance windows, restoration. Built for Canadian climate and code." />

  <link rel="apple-touch-icon" href="img/Crystal-Ball-Full-Color-Vertical-scaled.png" />
  <link rel="canonical" href="https://curious-concha-f11e49.netlify.app/commercial-developers.html" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Crystal Ball Windows & Doors" />
  <meta property="og:title" content="Commercial Facade Systems | Curtain Wall, Windows & Doors for Canadian Developers" />
  <meta property="og:description" content="European-engineered facade systems for commercial developers, general contractors, and construction managers. Curtain wall, high-performance windows, restoration." />
  <meta property="og:image" content="img/81-Bay-St.-Toronto.jpg" />
  <meta property="og:url" content="https://curious-concha-f11e49.netlify.app/commercial-developers.html" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Commercial Facade Systems | Crystal Ball" />
  <meta name="twitter:description" content="European-engineered facade systems for commercial developers, general contractors, and construction managers." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: '#FBFBFB', obsidian: '#F9FAFB', graphite: '#F3F4F6', glass: '#9b8e68', frost: '#EAF7FA', silver: '#4D4D4D', line: 'rgba(0,0,0,0.1)', canvas: '#FBFBFB', charcoal: '#4D4D4D', darkheading: '#1A1A1A', accentblue: '#9b8e68' },
      fontFamily: { questrial: ['Montserrat', 'sans-serif'], montserrat: ['Montserrat', 'sans-serif'] },
      boxShadow: { glow: '0 0 25px rgba(107, 114, 128, 0.1)', glass: 'inset 0 0 18px rgba(255,255,255,0.7), 0 18px 60px rgba(0,0,0,0.06)' },
    } } };
  </script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="noise font-questrial">
  <div id="root"></div>

  <script src="shared.js" type="text/babel"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { TextReveal, GlassReveal, Header, Footer, BottomCTA } = window;

    function Hero() {
      return (
        <section className="relative bg-canvas min-h-[80vh] pt-32 pb-20 px-6">
          <div className="mx-auto max-w-7xl relative z-10">
            <div className="max-w-4xl">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">COMMERCIAL DEVELOPERS & GCs</p></TextReveal>
              <TextReveal delay={100}><h1 className="mt-5 text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-light leading-[1.05] tracking-wide sm:tracking-[0.12em] break-words text-[#4D4D4D]">Facade systems<br/>for the projects you build.</h1></TextReveal>
              <TextReveal delay={200}><div className="my-8 h-px w-16 bg-[#4D4D4D]/80"></div></TextReveal>
              <TextReveal delay={300}><p className="text-xl text-charcoal leading-relaxed font-medium">Crystal Ball supplies European-tier window, door, and curtain wall systems to commercial developers, general contractors, and construction managers across Canada — backed by curtain wall and envelope expertise built over two decades on real projects.</p></TextReveal>
              <TextReveal delay={400}>
                <div className="mt-10">
                  <a href="contact.html?inquiry=commercial" className="group relative inline-flex items-center justify-center overflow-hidden border border-darkheading px-8 py-4 text-[14px] font-bold tracking-[0.2em] uppercase outline-none">
                    <span className="absolute inset-0 bg-darkheading -translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.77,0,0.175,1)] group-hover:translate-x-0 z-0"></span>
                    <span className="relative z-10 text-darkheading group-hover:text-white transition-colors duration-500">REQUEST A PROJECT CONSULTATION</span>
                  </a>
                </div>
              </TextReveal>
            </div>

            <div className="mt-20 grid gap-12 md:grid-cols-2 items-center">
              <GlassReveal delay={300} className="relative h-[500px] w-full">
                <div className="h-full w-full border border-black/10 overflow-hidden shadow-xl">
                  <img src="img/81-Bay-St.-Toronto.jpg" className="absolute inset-0 h-full w-full object-cover" />
                </div>
              </GlassReveal>
              <div>
                <TextReveal delay={400}><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">WHO THIS IS FOR</p></TextReveal>
                <TextReveal delay={500}><h3 className="mt-3 text-3xl font-light text-[#4D4D4D] mb-6">Built for commercial teams that can't afford a supplier surprise.</h3></TextReveal>
                <TextReveal delay={600}>
                  <p className="text-[15px] leading-8 text-[#4D4D4D]/80 mb-6">You are managing schedule, performance specs, code compliance, and field execution — often on the same project, in the same week. The last thing you need is a supplier who treats facade systems as a catalog problem.</p>
                </TextReveal>
                <ul className="mt-4 space-y-3">
                  {[
                    'Commercial developers building mid-rise mixed-use, ICI, and institutional',
                    'General contractors and construction managers',
                    'Project teams chasing Net Zero, high-efficiency, or LEED targets',
                    'Restoration and retrofit teams on occupied or heritage buildings',
                  ].map((t, i) => (
                    <TextReveal key={t} delay={700 + i * 80}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span>{t}</li></TextReveal>
                  ))}
                </ul>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // --- ALTERNATING-ROW PRIMITIVES ---
    // Mirror the About page layout system: each "card" of the former
    // grid becomes a full-bleed 2-col row of text + image, with the
    // image side alternating row-to-row. Row min-h is slightly shorter
    // than About's editorial rows since card-style content is briefer.
    // Rows match the width of the surrounding untouched sections (Hero,
    // Performance, Restoration) which all live inside `mx-auto max-w-7xl
    // px-6`. The section's bg still spans the full viewport for visual
    // continuity; only the content is constrained. RowText/RowImage no
    // longer carry their own bg — the section bg shows through uniformly
    // so the 80px image frame blends seamlessly into the row.
    function Row({ children, flip = false, bg = 'bg-canvas' }) {
      return (
        <section className={`${bg} w-full`}>
          <div className="mx-auto max-w-7xl px-6">
            <div className={`grid grid-cols-1 md:grid-cols-2 md:gap-8 ${flip ? 'md:[direction:rtl]' : ''}`}>
              {children}
            </div>
          </div>
        </section>
      );
    }
    function RowText({ children }) {
      return (
        <div className="md:[direction:ltr] py-12 md:py-20 flex flex-col justify-center">
          <div className="max-w-xl">{children}</div>
        </div>
      );
    }
    function RowImage({ src, alt = '' }) {
      return (
        <div className="md:[direction:ltr] grid p-8 md:p-20 min-h-[280px] md:min-h-[480px]">
          <div className="relative overflow-hidden">
            <img src={src} alt={alt} className="absolute inset-0 h-full w-full object-cover" />
          </div>
        </div>
      );
    }
    function SectionHeader({ eyebrow, title, intro, bg = 'bg-obsidian' }) {
      return (
        <section className={`${bg} border-t border-black/10 px-6 pt-20 md:pt-28 pb-10 md:pb-14`}>
          <div className="mx-auto max-w-7xl">
            <div className="max-w-2xl">
              <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">{eyebrow}</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">{title}</h2></TextReveal>
              {intro && <TextReveal delay={200}><p className="mt-6 text-[15px] leading-[1.8] text-[#4D4D4D]">{intro}</p></TextReveal>}
            </div>
          </div>
        </section>
      );
    }
    function PillarNum({ children }) {
      return (
        <TextReveal>
          <div className="font-light text-[#9b8e68]/35 leading-none mb-3 tracking-tight text-[44px] md:text-[56px]">{children}</div>
        </TextReveal>
      );
    }
    function PillarTitle({ children, delay = 100 }) {
      return (
        <TextReveal delay={delay}>
          <h3 className="text-[14px] font-medium tracking-[0.04em] uppercase text-[#1A1A1A] mb-3">{children}</h3>
        </TextReveal>
      );
    }
    function PillarBody({ children, delay = 200 }) {
      return (
        <TextReveal delay={delay}>
          <p className="text-[14px] leading-[1.8] text-[#4D4D4D]">{children}</p>
        </TextReveal>
      );
    }

    // --- WHAT WE DELIVER ---
    // Was a 5-card grid. Now: section header + 5 alternating rows.
    // No "01-05" numbers per item (original cards had no numbers).
    function WhatWeDeliver() {
      const items = [
        { title: 'Curtain Wall — Stick-Built & Unitized', body: 'Full facade assemblies engineered for mid-rise commercial. Matched to structural, thermal, and air/water performance criteria.', image: 'img/j-nadl-2341-1620x1080.jpg.webp', alt: 'Curtain wall system detail' },
        { title: 'Storefront Systems', body: 'Performance-driven entries and ground-floor glazing.', image: 'img/al_098.20-1852x1080.jpg.webp', alt: 'Aluminum storefront system' },
        { title: 'High-Performance Windows', body: 'Tilt & Turn, Casement, Awning, Fixed and Specialty Glazing — multi-chamber, triple-glazed where required.', image: 'img/jedraszek-best-391-1620x1080.jpg.webp', alt: 'High-performance window' },
        { title: 'Architectural Doors', body: 'Swing, sliding, lift & slide, bi-fold, and custom entrance assemblies.', image: 'img/TERTIAIRES1-scaled-1.webp', alt: 'Architectural entry door' },
        { title: 'Custom Facade Configurations', body: "When the project is not standard, the system isn't either.", image: 'img/Woodbine-Casino-Resort-Toronto-1-.jpg', alt: 'Custom facade project — Woodbine, Toronto' },
      ];
      return (
        <>
          <SectionHeader eyebrow="WHAT WE DELIVER" title="The systems your envelope actually needs." />
          {items.map((it, i) => {
            const textBg = i % 2 === 0 ? 'bg-obsidian' : 'bg-canvas';
            const imgBg = textBg;
            return (
              <Row key={it.title} flip={i % 2 === 1} bg={textBg}>
                <RowText bg={textBg}>
                  <PillarTitle>{it.title}</PillarTitle>
                  <PillarBody>{it.body}</PillarBody>
                </RowText>
                <RowImage src={it.image} alt={it.alt} bg={imgBg} />
              </Row>
            );
          })}
          <section className="bg-canvas border-t border-black/10 px-6 py-12 md:py-14">
            <div className="mx-auto max-w-7xl">
              <a href="products.html" className="inline-block text-[14px] font-bold tracking-[0.2em] text-darkheading uppercase hover:text-glass transition">See full system range →</a>
            </div>
          </section>
        </>
      );
    }

    function Performance() {
      const items = [
        'Thermal performance — U-value, condensation resistance, thermal break continuity',
        'Air and water performance — exceeding typical code minimums',
        'Structural performance — wind load, deflection, anchoring strategy',
        'Acoustic performance — OITC and STC where project-relevant',
        'Code and program alignment — OBC, NBCC, LEED, Passive House, Net Zero, Toronto Green Standard',
      ];
      return (
        <section className="bg-ink border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="grid gap-12 lg:grid-cols-2 items-start">
              <div>
                <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">PERFORMANCE STANDARDS</p></TextReveal>
                <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Built for Canadian conditions and Canadian code.</h2></TextReveal>
                <TextReveal delay={200}><p className="mt-6 text-[15px] leading-8 text-[#4D4D4D]/80">Every system we supply is evaluated against:</p></TextReveal>
                <ul className="mt-6 space-y-3">
                  {items.map((t, i) => (
                    <TextReveal key={t} delay={300 + i * 70}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span>{t}</li></TextReveal>
                  ))}
                </ul>
                <TextReveal delay={700}><p className="mt-8 text-[15px] font-bold text-[#1A1A1A]">This is not specification theatre. These criteria are how we eliminate the systems that won't perform on your project — before procurement.</p></TextReveal>
              </div>
              <GlassReveal delay={100} className="relative h-[500px] w-full">
                <div className="h-full w-full border border-black/10 overflow-hidden shadow-xl">
                  <img src="img/al_063.20-1920x1040.jpg.webp" className="absolute inset-0 h-full w-full object-cover" />
                </div>
              </GlassReveal>
            </div>
          </div>
        </section>
      );
    }

    // --- PROJECT COORDINATION ---
    // Was a 6-card grid with 01-06 labels. Now: section header
    // + 6 alternating rows with the original 01-06 sequence preserved
    // as big faded-gold pillar numbers above each title.
    function Coordination() {
      const items = [
        { title: 'Design Assist', body: 'System selection and detailing aligned to architectural intent and constructability.', image: 'img/j-nadl-220-1620x1080.jpg.webp', alt: 'Design detail of an aluminum window system' },
        { title: 'Shop Drawing Review', body: 'Anchoring, transitions, sealing details, dissimilar materials.', image: 'img/fiberglass-triple-glazed-windows-and-doors-800x500-1.jpg', alt: 'Technical detail of triple-glazed system' },
        { title: 'Logistics Planning', body: 'Lead times, sequencing, hoisting, on-site storage.', image: 'img/82-Wilson-Ave.-Kitchener-Ontario-1.jpeg', alt: '82 Wilson Ave project, Kitchener' },
        { title: 'Site Readiness', body: 'Substrate, tolerances, transitions to adjacent trades.', image: 'img/MDS-REALIZACJE.jpg', alt: 'Modern facade installation context' },
        { title: 'Installation Oversight', body: 'Available under Supply & Install delivery.', image: 'img/Panorama.webp', alt: 'Bi-fold door installation' },
        { title: 'Post-Installation Review', body: 'Performance verification, punch resolution, closeout.', image: 'img/al_063.20-1920x1040.jpg.webp', alt: 'Aluminum window detail' },
      ];
      return (
        <>
          <section id="coordination" className="bg-obsidian border-t border-black/10 px-6 pt-20 md:pt-28 pb-10 md:pb-14">
            <div className="mx-auto max-w-7xl">
              <div className="max-w-2xl">
                <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">PROJECT COORDINATION</p></TextReveal>
                <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">A supplier who reads the drawings.</h2></TextReveal>
                <TextReveal delay={200}><p className="mt-6 text-[15px] leading-[1.8] text-[#4D4D4D]">Crystal Ball was built by people who have run, sequenced, and inspected facade installations. That changes how we engage on a project.</p></TextReveal>
              </div>
            </div>
          </section>
          {items.map((it, i) => {
            const textBg = i % 2 === 0 ? 'bg-obsidian' : 'bg-canvas';
            const imgBg = textBg;
            return (
              <Row key={it.title} flip={i % 2 === 1} bg={textBg}>
                <RowText bg={textBg}>
                  <PillarNum>0{i + 1}</PillarNum>
                  <PillarTitle>{it.title}</PillarTitle>
                  <PillarBody>{it.body}</PillarBody>
                </RowText>
                <RowImage src={it.image} alt={it.alt} bg={imgBg} />
              </Row>
            );
          })}
        </>
      );
    }

    function Restoration() {
      const items = [
        'Existing window replacement on occupied buildings',
        'Sequencing strategies to keep tenants in place',
        'EnerPHit-style performance upgrades',
        'Overcladding and envelope performance enhancement',
        'Heritage-sensitive replacement specifications',
      ];
      return (
        <section id="restoration" className="bg-ink border-t border-black/10 px-6 py-28 relative">
          <div className="mx-auto max-w-7xl">
            <div className="grid gap-12 lg:grid-cols-2 items-center">
              <GlassReveal className="relative h-[500px] w-full">
                <div className="h-full w-full border border-black/10 overflow-hidden shadow-xl">
                  <img src="img/Forma-1.jpg" className="absolute inset-0 h-full w-full object-cover" />
                </div>
              </GlassReveal>
              <div>
                <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">RESTORATION & RETROFIT</p></TextReveal>
                <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Executed without ignoring the building you're in.</h2></TextReveal>
                <TextReveal delay={200}><p className="mt-6 text-[15px] leading-8 text-[#4D4D4D]/80">Existing buildings are not new construction. They come with sequencing constraints, occupied floors, heritage considerations, and envelope conditions that don't appear on any drawing set.</p></TextReveal>
                <ul className="mt-6 space-y-3">
                  {items.map((t, i) => (
                    <TextReveal key={t} delay={300 + i * 70}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span>{t}</li></TextReveal>
                  ))}
                </ul>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // --- DELIVERY MODELS ---
    // Was a 3-card grid with large 01-03 numerals. Now: section
    // header + 3 alternating rows. Numbers preserved as the same
    // faded-gold pillar numerals used on other sections.
    function DeliveryModels() {
      const cards = [
        { num: '01', title: 'Supply Only', body: 'Builders and GCs with established installation teams who want premium systems with technical support.', image: 'img/shutterstock_552591889.webp', alt: 'Premium lift-and-slide door system' },
        { num: '02', title: 'Supply & Installation', body: 'Single-point responsibility — Crystal Ball oversees installation to protect system performance.', image: 'img/CAnnes-FD-39-AI3-scaled-1.png', alt: 'Door system in installed context' },
        { num: '03', title: 'Facade Advisory', body: 'Early-stage design support, specification, and coordination — paid advisory engagement.', image: 'img/olympus-digital-camera-1125x1500-1.jpg', alt: 'Facade design review' },
      ];
      return (
        <>
          <SectionHeader eyebrow="DELIVERY MODELS" title="Three ways we deliver." />
          {cards.map((c, i) => {
            const textBg = i % 2 === 0 ? 'bg-obsidian' : 'bg-canvas';
            const imgBg = textBg;
            return (
              <Row key={c.num} flip={i % 2 === 1} bg={textBg}>
                <RowText bg={textBg}>
                  <PillarNum>{c.num}</PillarNum>
                  <PillarTitle>{c.title}</PillarTitle>
                  <PillarBody>{c.body}</PillarBody>
                </RowText>
                <RowImage src={c.image} alt={c.alt} bg={imgBg} />
              </Row>
            );
          })}
          <section className="bg-canvas border-t border-black/10 px-6 md:px-14 py-12 md:py-14">
            <a href="project-support.html" className="inline-block text-[14px] font-bold tracking-[0.2em] text-darkheading uppercase hover:text-glass transition">See full project support detail →</a>
          </section>
        </>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <Header currentPage="markets" />
          <main className="min-h-screen">
            <Hero />
            <WhatWeDeliver />
            <Performance />
            <Coordination />
            <Restoration />
            <DeliveryModels />
            <BottomCTA />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
