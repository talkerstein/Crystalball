<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Crystal Ball Windows & Doors</title>
  <meta name="description" content="Your inquiry has been received. The Crystal Ball team will respond within one business day." />
  <meta name="robots" content="noindex,follow" />

  <link rel="icon" type="image/png" href="img/Crystal-Ball-Full-Color-Vertical-scaled.png" />
  <link rel="apple-touch-icon" href="img/Crystal-Ball-Full-Color-Vertical-scaled.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: '#FEFEFE', obsidian: '#F9FAFB', graphite: '#F3F4F6', glass: '#6B7280', frost: '#EAF7FA', silver: '#4D4D4D', line: 'rgba(0,0,0,0.1)', canvas: '#FEFEFE', charcoal: '#4D4D4D', darkheading: '#1A1A1A', accentblue: '#6B7280' },
      fontFamily: { montserrat: ['Montserrat', 'sans-serif'] },
      boxShadow: { glow: '0 0 25px rgba(107, 114, 128, 0.1)', glass: 'inset 0 0 18px rgba(255,255,255,0.7), 0 18px 60px rgba(0,0,0,0.06)' },
    } } };
  </script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="noise font-montserrat">
  <div id="root"></div>

  <script src="shared.js" type="text/babel"></script>

  <script type="text/babel">
    const { TextReveal, GlassReveal, Header, Footer } = window;

    function ThanksPage() {
      return (
        <section className="relative bg-canvas min-h-[80vh] pt-32 pb-20 px-6 flex items-center">
          <div className="mx-auto max-w-7xl relative z-10 w-full">
            <div className="grid gap-12 md:grid-cols-2 items-center">
              <div>
                <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">INQUIRY RECEIVED</p></TextReveal>
                <TextReveal delay={100}><h1 className="mt-5 text-5xl font-light leading-[1.05] tracking-[0.12em] md:text-7xl text-[#4D4D4D]">THANKS.<br/>WE'RE ON IT.</h1></TextReveal>
                <TextReveal delay={200}><div className="my-8 h-1 w-16 bg-[#4D4D4D]/80"></div></TextReveal>
                <TextReveal delay={300}><p className="text-xl text-charcoal leading-relaxed font-medium">Your message has been received by the Crystal Ball team. We respond to every inquiry within one business day.</p></TextReveal>

                <div className="mt-10 space-y-4">
                  <TextReveal delay={400}>
                    <p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">WHAT HAPPENS NEXT</p>
                  </TextReveal>
                  <TextReveal delay={500}>
                    <ol className="space-y-3 mt-4">
                      <li className="flex items-start gap-4"><span className="text-[14px] font-bold tracking-[0.15em] text-glass w-8 pt-1">01</span><span className="text-[15px] leading-7 text-[#4D4D4D]">We review your project against our delivery capability.</span></li>
                      <li className="flex items-start gap-4"><span className="text-[14px] font-bold tracking-[0.15em] text-glass w-8 pt-1">02</span><span className="text-[15px] leading-7 text-[#4D4D4D]">We respond with system options, advisory recommendation, or a partnership conversation — whichever fits.</span></li>
                      <li className="flex items-start gap-4"><span className="text-[14px] font-bold tracking-[0.15em] text-glass w-8 pt-1">03</span><span className="text-[15px] leading-7 text-[#4D4D4D]">If we need more, we'll set up a call to walk the project together.</span></li>
                    </ol>
                  </TextReveal>
                </div>

                <TextReveal delay={700}>
                  <div className="mt-12 flex flex-col sm:flex-row gap-4">
                    <a href="index.html" className="border border-darkheading bg-darkheading px-7 py-4 text-[13px] font-bold tracking-[0.2em] text-white hover:bg-charcoal transition uppercase shadow-sm">Return Home →</a>
                    <a href="products.html" className="border border-darkheading bg-white px-7 py-4 text-[13px] font-bold tracking-[0.2em] text-darkheading hover:bg-darkheading hover:text-white transition uppercase shadow-sm">Browse Systems</a>
                  </div>
                </TextReveal>
              </div>

              <GlassReveal delay={200} className="relative h-[500px] w-full">
                <div className="h-full w-full border border-black/10 overflow-hidden shadow-xl">
                  <img src="img/Crystal-Ball-Hero-scaled.webp" className="absolute inset-0 h-full w-full object-cover" />
                  <div className="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
                </div>
              </GlassReveal>
            </div>
          </div>
        </section>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <Header currentPage="" />
          <main className="min-h-screen">
            <ThanksPage />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
