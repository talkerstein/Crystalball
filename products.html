    // --- LAYOUT PRIMITIVES (mirrors About page; full-bleed editorial style) ---
    function Row({ children, flip = false, bg = 'bg-canvas', id }) {
      return (
        <section id={id} className={`${bg} w-full`}>
          <div className={`grid grid-cols-1 md:grid-cols-2 ${flip ? 'md:[direction:rtl]' : ''}`}>
            {children}
          </div>
        </section>
      );
    }
    function RowText({ children }) {
      return (
        <div className="md:[direction:ltr] px-6 md:px-14 py-16 md:py-24 flex flex-col justify-center">
          <div className="max-w-xl w-full">{children}</div>
        </div>
      );
    }
    function RowImage({ src, alt = '', bg = 'bg-obsidian' }) {
      // Image is locked to a 4:3 aspect ratio so it never stretches with
      // the text column when the catalog accordion expands. On md+ the
      // middle wrapper is `position: sticky` so the image pins below the
      // fixed header (h ≈ 84px → top-28 = 112px) while the text column
      // scrolls past it. The outer grid cell still stretches to the row
      // height by default, giving the sticky element room to operate.
      return (
        <div className={`${bg} md:[direction:ltr] p-8 md:p-20`}>
          <div className="md:sticky md:top-28">
            <div className="relative w-full aspect-[4/3] overflow-hidden">
              <img src={src} alt={alt} className="absolute inset-0 h-full w-full object-cover" />
            </div>
          </div>
        </div>
      );
    }
    function Eyebrow({ children, light = false }) {
      return (
        <TextReveal>
          <p className={`text-[14px] font-medium tracking-[0.15em] uppercase mb-4 ${light ? 'text-white/70' : 'text-[#9b8e68]'}`}>{children}</p>
        </TextReveal>
      );
    }

    // --- HERO ---
    function SystemsHero() {

              <p className="text-[14px] font-medium tracking-[0.15em] text-white uppercase mb-4">Systems</p>
            </TextReveal>

                High-performance European systems.
              </h1>
            </TextReveal>
            <TextReveal delay={200}>
              <p className="mt-6 max-w-xl text-[15px] leading-[1.75] text-white/60">
                Windows, doors, and curtain wall assemblies engineered to exceed Canadian performance standards. Sourced from established European manufacturers and supported with construction-level expertise.
              </p>
            </TextReveal>
            <TextReveal delay={300}>
              <a href="#categories" className="group relative mt-8 inline-flex items-center justify-center overflow-hidden border border-white px-7 py-3 text-[14px] leading-none tracking-[0.09em] uppercase outline-none">
                <span className="absolute inset-0 bg-white -translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.77,0,0.175,1)] group-hover:translate-x-0 z-0"></span>
                <span className="relative z-10 text-white group-hover:text-darkheading transition-colors duration-500">Explore systems</span>
              </a>
            </TextReveal>
          </div>
        </section>
      );
    }

    // --- CATEGORY INTRO LINE ---
    // Short breadcrumb-style section between hero and the 3 category rows.
    function CatIntro() {
      return (
        <section id="categories" className="bg-canvas border-b border-black/10 px-6 md:px-14 py-12 md:py-16">
          <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-6">
            <div>
              <Eyebrow>Product systems</Eyebrow>
              <TextReveal delay={100}>
                <h2 className="text-[22px] sm:text-[28px] md:text-[36px] font-light leading-tight text-[#1A1A1A]">
                  Three groups.<br/>One performance standard.
                </h2>
              </TextReveal>
            </div>
            <TextReveal delay={200}>
              <p className="text-[14px] leading-[1.75] text-[#4D4D4D]/70 md:text-right max-w-xs">

    }

    // --- PRODUCT ACCORDION ---
    // Renders the Material > Mechanism > Products tree for a category.
    // Each product name is a link to its existing detail page.
    function ProductAccordion({ cat, isOpen }) {
      return (
        <div
          className={`overflow-hidden transition-all duration-500 ease-in-out ${isOpen ? 'mt-8 max-h-[4000px] opacity-100' : 'mt-0 max-h-0 opacity-0'}`}
          aria-hidden={!isOpen}
        >
          <div className="pt-6">
            {cat.materials.map((mat, mi) => (
              <div key={mat.material} className={mi === 0 ? '' : 'mt-8'}>
                {/* Material label — first-level sub-group (black, semibold, no divider) */}
                <div className="text-[14px] font-semibold tracking-[0.15em] uppercase text-[#1A1A1A] mb-3">
                  {mat.material}
                </div>
                {mat.mechanisms.map((mech, midx) => (
                  <div
                    key={`${mat.material}-${mech.name}-${midx}`}
                    id={`mechanism-${mech.mechId}`}
                    className={midx === 0 ? 'mt-3' : 'mt-5'}
                  >
                    {/* Mechanism label — second-level sub-group (gold accent) */}
                    <div className="text-[14px] font-semibold tracking-[0.08em] uppercase text-[#9b8e68] mb-2">
                      {mech.name}
                    </div>
                    <ul>
                      {mech.products.map((pid) => {
                        const p = products.find(x => x.id === pid);
                        if (!p) return null;
                        // Display: strip any "(Manufacturer)" parens from the
                        // name and surface the manufacturer + variant as
                        // small grey detail text (like the reference).
                        const parenMatch = p.name.match(/^(.+?)\s*\((.+)\)\s*$/);
                        const displayName = parenMatch ? parenMatch[1].trim() : p.name;
                        // detail = manufacturer + any tag variant
                        // (e.g. "uPVC - T&T and Swing" -> "Aluplast — T&T and Swing")
                        const manufacturer = parenMatch ? parenMatch[2].trim() : '';
                        const tagDetail = p.tag.includes(' - ') ? p.tag.split(' - ').slice(1).join(' - ') : '';
                        const detail = manufacturer && tagDetail
                          ? `${manufacturer} — ${tagDetail}`
                          : (manufacturer || tagDetail);
                        return (
                          <li key={pid} className="flex items-baseline justify-between gap-4 py-2.5">
                            <a href={`${pid}.html`} className="group inline-flex items-baseline gap-3 text-[14px] text-[#4D4D4D] hover:text-[#1A1A1A] transition-colors">
                              <span>{displayName}</span>
                              {detail && <span className="text-[14px] text-[#9a9690]">{detail}</span>}
                            </a>
                            <a href={`${pid}.html`} className="shrink-0 text-[14px] font-medium tracking-[0.08em] uppercase text-[#9a9690] hover:text-[#9b8e68] transition-colors">
                              View →
                            </a>
                          </li>
                        );
                      })}
                    </ul>
                  </div>
                ))}
              </div>
            ))}
            {cat.footerNote && (
              <p className="mt-6 text-[14px] italic text-[#9a9690]">{cat.footerNote}</p>
            )}
          </div>
        </div>
      );
    }

    // --- CATEGORY ROW ---
    // Full-bleed 2-col: image + text. Text col houses the catalog accordion.
    // The Row primitive's `flip` prop swaps image and text via CSS
    // `direction: rtl` on md+, so we always declare children in
    // image-then-text order and let CSS handle the visual reordering.
    function CategoryRow({ cat, isOpen, onToggle, flip, textBg, imgBg }) {
      return (
        <Row id={`category-${cat.id}`} flip={flip} bg={textBg}>
          <RowImage src={cat.image} alt={cat.alt} bg={imgBg} />
          <RowText>
            <CategoryTextContent cat={cat} isOpen={isOpen} onToggle={onToggle} />
          </RowText>
        </Row>
      );
    }

    function CategoryTextContent({ cat, isOpen, onToggle }) {
      return (
        <>
          <TextReveal>
            <div className="text-[14px] tracking-[0.12em] text-[#9a9690] mb-5">{cat.catNum}</div>
          </TextReveal>
          <Eyebrow>Category</Eyebrow>
          <TextReveal delay={100}>
            <h2 className="text-[26px] sm:text-[32px] md:text-[40px] font-light leading-tight text-[#1A1A1A] mb-5">
              {cat.name}
            </h2>
          </TextReveal>
          <TextReveal delay={200}>
            <p className="text-[14px] leading-[1.8] text-[#4D4D4D]">{cat.intro}</p>
          </TextReveal>
          <TextReveal delay={300}>
            <button
              type="button"
              onClick={onToggle}
              aria-expanded={isOpen}
              className="group mt-8 w-full flex items-center gap-3 py-5 text-[14px] font-semibold tracking-[0.09em] uppercase text-[#1A1A1A] hover:text-[#9b8e68] transition-colors outline-none"
            >
              <span>{isOpen ? 'Hide systems' : 'View systems'}</span>
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                strokeWidth="1.5"
                className={`h-4 w-4 ml-auto transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`}
              >
                <path strokeLinecap="round" strokeLinejoin="round" d="M6 9l6 6 6-6" />
              </svg>
            </button>
          </TextReveal>
          <ProductAccordion cat={cat} isOpen={isOpen} />
        </>
      );
    }

    // --- TECHNICAL HIGHLIGHTS ---

        <section className="bg-darkheading w-full px-6 md:px-14 py-20 md:py-28">

            <TextReveal delay={100}>

    // --- RESOURCES ROW ---
    // 2-col: image left + text right. 5 links matching the reference;
    // unbuilt destinations route to resources.html per spec.
    function Resources() {
      const links = [
        { label: 'Document library', href: 'resources.html' },
        { label: 'System specifications', href: 'resources.html' },
        { label: 'Project support', href: 'project-support.html' },
        { label: 'Dealer partnerships', href: 'dealer-partnerships.html' },

        <Row bg="bg-obsidian">
          <RowImage
            src="img/81-Bay-St.-Toronto.jpg"
            alt="81 Bay Street, Toronto — Crystal Ball commercial facade reference"
            bg="bg-obsidian"
          />
          <RowText>
            <Eyebrow>For professionals</Eyebrow>
            <TextReveal delay={100}>
              <h2 className="text-[22px] sm:text-[28px] md:text-[36px] font-light leading-tight text-[#1A1A1A] mb-5">
                Technical support &amp; resources.
              </h2>
            </TextReveal>
            <TextReveal delay={200}>
              <p className="text-[14px] leading-[1.8] text-[#4D4D4D]">
                Specifications, technical documents, and project-level support available for architects, contractors, and dealer partners.
              </p>
            </TextReveal>
            <TextReveal delay={300}>
              <ul className="mt-6">
                {links.map((l) => (
                  <li key={l.label}>
                    <a href={l.href} className="group flex items-center justify-between py-3.5 text-[14px] text-[#1A1A1A] hover:text-[#9b8e68] transition-colors">

                      </svg>
                    </a>

            </TextReveal>
          </RowText>
        </Row>
      );
    }

    function App() {
      // Only one accordion open at a time. `null` = all collapsed.
      const [openCat, setOpenCat] = useState(null);

      const toggleCat = (id) => setOpenCat((cur) => (cur === id ? null : id));

      // Deep-link handling — keeps the existing mega menu working:
      //   ?cat=windows|doors|curtain-wall  -> open + scroll to category
      //   #category-<slug>                 -> open + scroll to category
      //   #mechanism-<id>                  -> open enclosing category + scroll to that mechanism
      useEffect(() => {
        const scrollToAnchor = (anchorId) => {
          const el = document.getElementById(anchorId);
          if (!el) return;
          const y = el.getBoundingClientRect().top + window.scrollY - 100;
          window.scrollTo({ top: y, behavior: 'smooth' });
        };
        const params = new URLSearchParams(window.location.search);
        const catParam = params.get('cat');
        const hash = window.location.hash.replace('#', '');

        let categoryToOpen = null;
        let scrollTarget = null;

        if (catParam) {
          categoryToOpen = catParam;
          scrollTarget = `category-${catParam}`;
        } else if (hash.startsWith('category-')) {
          categoryToOpen = hash.replace('category-', '');
          scrollTarget = hash;
        } else if (hash.startsWith('mechanism-')) {
          const mechId = hash.replace('mechanism-', '');
          // Find which category contains this mechanism so we can open it.
          for (const cat of catalog) {
            for (const mat of cat.materials) {
              if (mat.mechanisms.some(m => m.mechId === mechId)) {
                categoryToOpen = cat.id;
                break;
              }
            }
            if (categoryToOpen) break;
          }
          scrollTarget = hash;
        }

        if (categoryToOpen) setOpenCat(categoryToOpen);
        if (scrollTarget) {
          // Wait for the accordion transition before scrolling
          setTimeout(() => scrollToAnchor(scrollTarget), categoryToOpen ? 600 : 100);
        }
      }, []);

      return (
        <React.Fragment>
          <Header currentPage="products" />
          <main className="min-h-screen">
            <SystemsHero />
            <CatIntro />
            {catalog.map((cat, i) => (
              <CategoryRow
                key={cat.id}
                cat={cat}
                isOpen={openCat === cat.id}
                onToggle={() => toggleCat(cat.id)}
                flip={i % 2 === 1}
                textBg={i % 2 === 0 ? 'bg-canvas' : 'bg-obsidian'}
                imgBg={i % 2 === 0 ? 'bg-canvas' : 'bg-obsidian'}
              />
            ))}
            <TechnicalHighlights />
            <Resources />
            <BottomCTA hideBrowse />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
