<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Systems | European Windows, Doors, Curtain Wall | Crystal Ball</title>
  <meta name="description" content="Full product range: Tilt & Turn, Casement, Lift & Slide, Bi-fold, curtain wall and storefront systems. European-engineered for Canadian performance." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: '#FEFEFE', obsidian: '#F9FAFB', graphite: '#F3F4F6', glass: '#6B7280', frost: '#EAF7FA', silver: '#4D4D4D', line: 'rgba(0,0,0,0.1)', canvas: '#FEFEFE', charcoal: '#4D4D4D', darkheading: '#1A1A1A', accentblue: '#6B7280' },
      fontFamily: { montserrat: ['Montserrat', 'sans-serif'] },
      boxShadow: { glow: '0 0 25px rgba(107, 114, 128, 0.1)', glass: 'inset 0 0 18px rgba(255,255,255,0.7), 0 18px 60px rgba(0,0,0,0.06)' },
    } } };
  </script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="noise font-montserrat">
  <div id="root"></div>

  <script src="shared.js" type="text/babel"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { TextReveal, GlassReveal, Header, Footer, BottomCTA, products } = window;

    function SystemsHub() {
      const catalogRef = useRef(null);
      const [categoryFilter, setCategoryFilter] = useState('All');

      const scrollToCatalog = (cat) => {
        setCategoryFilter(cat);
        if (catalogRef.current) {
          const y = catalogRef.current.getBoundingClientRect().top + window.scrollY - 88;
          window.scrollTo({ top: y, behavior: 'smooth' });
        }
      };

      const topCategories = [
        { id: 'windows', title: 'Architectural Windows', categoryMatch: 'Windows', desc: 'Tilt & Turn, Casement, Awning, Fixed and Specialty Glazing across Aluminum, uPVC, and Fiberglass — engineered for Passive House, Net Zero, and high-performance commercial.', img: 'https://crystal-ball.ca/wp-content/uploads/2026/05/29934274d638ae4gb488d6dbdb7aa6a6.jpg' },
        { id: 'doors', title: 'Premium Doors', categoryMatch: 'Doors', desc: 'Swing, Sliding, Lift & Slide, Bi-fold, and custom entrance assemblies. Engineered for thermal performance, hardware durability, and architectural integration.', img: 'https://crystal-ball.ca/wp-content/uploads/2026/05/MDS-REALIZACJE.jpg' },
        { id: 'curtain-wall', title: 'Curtain Wall & Facade', categoryMatch: 'Curtain wall', desc: 'Stick-built and unitized commercial assemblies, storefront, and custom facade configurations. Engineered to meet structural, thermal, and acoustic performance criteria.', img: 'https://crystal-ball.ca/wp-content/uploads/2026/05/j-nadl-2341-1620x1080.jpg.webp' }
      ];

      const materials = [
        { title: "High-Performance Aluminum", desc: "Thermally broken multi-chamber profiles. Slim sightlines, large-format capability, and a refined architectural finish — without compromising thermal performance." },
        { title: "Advanced uPVC", desc: "Multi-chamber profiles delivering excellent thermal performance, dimensional stability, and accessible cost — the workhorse of European high-performance residential." },
        { title: "Composite Fiberglass", desc: "Pultruded composite engineered for extreme climates — class-leading thermal performance, minimal expansion, and long-term dimensional stability." }
      ];

      const operations = [
        { title: "Tilt & Turn", desc: "The European default. Inward-opening, dual-operation, superior air sealing. The first-choice system for Passive House and high-performance residential or light commercial." },
        { title: "Lift & Slide", desc: "Multi-panel glazed walls that operate at scale. The lift mechanism frees the rollers and drops a perfect weather seal in the closed position." },
        { title: "Swing & Casement", desc: "North American configurations at European performance levels — for projects requiring traditional operation without compromising the envelope." },
        { title: "Multi-Panel Folding", desc: "Indoor-outdoor opening at residential and light commercial scale. Robust accordion systems supporting immense weight on minimal frame depths." }
      ];

      const filteredProducts = products.filter(p => categoryFilter === 'All' || p.category === categoryFilter);

      return (
        <React.Fragment>
          <section className="relative bg-canvas min-h-screen pt-32 pb-20 px-6">
            <div className="mx-auto max-w-7xl relative z-10">

              <div className="max-w-3xl mb-16">
                <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">SYSTEMS</p></TextReveal>
                <TextReveal delay={100}><h1 className="mt-5 text-5xl font-light leading-[1.05] tracking-[0.12em] md:text-7xl text-[#4D4D4D]">ENGINEERED<br/>FOR THE ENVELOPE.</h1></TextReveal>
                <TextReveal delay={200}><div className="my-8 h-1 w-16 bg-[#4D4D4D]/80"></div></TextReveal>
                <TextReveal delay={300}><p className="text-xl text-charcoal leading-relaxed font-medium">Every Crystal Ball system is selected and supplied based on actual project performance criteria — thermal, structural, acoustic, and code. Below is the full system range.</p></TextReveal>
              </div>

              {/* 3 Core Categories */}
              <div className="grid gap-8 md:grid-cols-3 mb-24">
                {topCategories.map((cat, i) => (
                  <GlassReveal key={cat.id} delay={i * 100}>
                    <div id={cat.id} className="group border border-black/10 overflow-hidden bg-white flex flex-col h-full scroll-mt-24">
                      <div className="h-[300px] w-full overflow-hidden relative shrink-0">
                        <img src={cat.img} className="absolute inset-0 h-full w-full object-cover transition duration-700 group-hover:scale-105" />
                      </div>
                      <div className="p-8 flex flex-col flex-grow justify-between">
                        <div>
                          <h3 className="text-2xl font-light text-[#1A1A1A] mb-4">{cat.title}</h3>
                          <p className="text-[14px] leading-6 text-[#4D4D4D]/70">{cat.desc}</p>
                        </div>
                        <button onClick={() => scrollToCatalog(cat.categoryMatch)} className="mt-8 text-left text-[12px] font-bold tracking-[0.2em] text-glass uppercase group-hover:text-black transition outline-none">VIEW COLLECTION →</button>
                      </div>
                    </div>
                  </GlassReveal>
                ))}
              </div>

              {/* Material Technologies */}
              <div className="pt-24 pb-16 border-t border-black/10">
                <div className="mb-12">
                  <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">CORE MATERIALS</p></TextReveal>
                  <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Material Intelligence.</h2></TextReveal>
                </div>
                <div className="grid gap-6 md:grid-cols-3">
                  {materials.map((mat, i) => (
                    <GlassReveal key={i} delay={i * 100} className="h-full">
                      <div className="h-full border border-black/10 bg-white p-8 hover:border-glass transition">
                        <h4 className="font-bold text-[#1A1A1A] tracking-wider mb-4">{mat.title}</h4>
                        <p className="text-sm leading-6 text-[#4D4D4D]/80">{mat.desc}</p>
                      </div>
                    </GlassReveal>
                  ))}
                </div>
              </div>

              {/* Operation & Hardware */}
              <div className="pt-24 pb-16 border-t border-black/10">
                <div className="mb-12 max-w-2xl">
                  <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">HARDWARE & MECHANICS</p></TextReveal>
                  <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Engineered to Move.</h2></TextReveal>
                </div>
                <div className="grid gap-6 md:grid-cols-2 lg:grid-cols-4">
                  {operations.map((op, i) => (
                    <GlassReveal key={i} delay={i * 100} className="h-full">
                      <div className="h-full border border-black/10 bg-obsidian p-8 hover:border-glass transition">
                        <h4 className="font-bold text-[#1A1A1A] tracking-wider mb-4">{op.title}</h4>
                        <p className="text-sm leading-6 text-[#4D4D4D]/80">{op.desc}</p>
                      </div>
                    </GlassReveal>
                  ))}
                </div>
              </div>

              {/* Performance Standards */}
              <div className="pt-24 pb-16 border-t border-black/10">
                <div className="mb-12 max-w-3xl">
                  <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">PERFORMANCE STANDARDS</p></TextReveal>
                  <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">Built for Canadian conditions and Canadian code.</h2></TextReveal>
                </div>
                <ul className="grid gap-4 md:grid-cols-2">
                  {[
                    'Thermal performance — U-value, condensation resistance, thermal break continuity',
                    'Air and water performance — exceeding typical code minimums',
                    'Structural performance — wind load, deflection, anchoring strategy',
                    'Acoustic performance — OITC and STC where project-relevant',
                    'Code alignment — OBC, NBCC, LEED, Toronto Green Standard',
                    'Program alignment — Passive House, Net Zero, EnerPHit',
                  ].map((t, i) => (
                    <TextReveal key={t} delay={i * 60}>
                      <li className="flex items-start text-[15px] font-medium text-[#4D4D4D] border-l-2 border-glass pl-5 py-2"><span className="mr-3 text-glass">■</span>{t}</li>
                    </TextReveal>
                  ))}
                </ul>
              </div>

              {/* Comprehensive Product Catalog Grid */}
              <div ref={catalogRef} className="pt-24 border-t border-black/10">
                <div className="mb-12 flex flex-col justify-between gap-6 md:flex-row md:items-end">
                  <div>
                    <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">COMPLETE CATALOG</p></TextReveal>
                    <TextReveal delay={100}><h2 className="mt-3 text-3xl font-light text-[#4D4D4D] md:text-5xl">System Collection.</h2></TextReveal>
                  </div>
                  <TextReveal delay={200} className="w-full md:w-auto">
                    <div className="flex flex-wrap gap-2">
                      {['All', 'Windows', 'Doors', 'Curtain wall'].map((category) => (
                        <button key={category} onClick={() => setCategoryFilter(category)} className={`px-5 py-3 text-[12px] font-bold tracking-[0.2em] uppercase transition outline-none ${categoryFilter === category ? 'bg-[#1A1A1A] text-white shadow-sm' : 'border border-black/10 text-charcoal hover:border-glass hover:text-darkheading bg-[#FEFEFE]'}`}>
                          {category}
                        </button>
                      ))}
                    </div>
                  </TextReveal>
                </div>

                <div className="grid gap-6 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
                  {filteredProducts.map((item, index) => (
                    <GlassReveal key={item.name} delay={(index % 3) * 100} className="w-full">
                      <div className="product-card group relative h-[420px] w-full overflow-hidden border border-black/10 bg-graphite select-none hover:border-glass transition-colors duration-300">
                        <img src={item.image} className="absolute inset-0 h-full w-full object-cover opacity-90 transition duration-700 pointer-events-none product-img" />
                        <div className="absolute inset-x-0 bottom-0 h-3/5 bg-gradient-to-t from-white via-white/80 to-transparent pointer-events-none"></div>
                        <div className="absolute bottom-0 left-0 right-0 p-6 pointer-events-none">
                          <p className="text-[12px] font-bold tracking-[0.2em] text-glass uppercase">{item.category} / {item.tag}</p>
                          <h3 className="mt-2 text-2xl font-light text-[#4D4D4D]">{item.name}</h3>
                        </div>
                        <div className="product-overlay absolute inset-4 flex translate-y-4 flex-col justify-end bg-white/70 backdrop-blur-md p-6 opacity-0 transition duration-300 border border-white/50">
                          <h4 className="text-xl font-light text-[#1A1A1A]">{item.name}</h4>
                          <ul className="mt-4 space-y-2">
                            {item.specs.map(spec => (
                              <li key={spec} className="flex items-start text-[13px] text-[#4D4D4D]"><span className="mr-2 text-glass">■</span>{spec}</li>
                            ))}
                          </ul>
                          <div className="mt-6 flex flex-col gap-3">
                            <a href="contact.html" className="border border-darkheading bg-darkheading text-center px-4 py-3.5 text-[13px] font-bold tracking-[0.2em] text-white hover:bg-charcoal transition uppercase outline-none w-full">
                              REQUEST A QUOTE
                            </a>
                          </div>
                        </div>
                      </div>
                    </GlassReveal>
                  ))}
                </div>
              </div>

            </div>
          </section>
          <BottomCTA />
        </React.Fragment>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <Header currentPage="products" />
          <main className="min-h-screen">
            <SystemsHub />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
