<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services | Crystal Ball Windows & Doors</title>
  <meta name="description" content="Crystal Ball supports facade projects from design through post-installation with supply-only, supply and installation, advisory, coordination, and project management services." />

  <link rel="icon" type="image/png" href="img/Crystal-Ball-Full-Color-Vertical-scaled.png" />
  <link rel="apple-touch-icon" href="img/Crystal-Ball-Full-Color-Vertical-scaled.png" />
  <link rel="canonical" href="https://curious-concha-f11e49.netlify.app/services.html" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Crystal Ball Windows & Doors" />
  <meta property="og:title" content="Services | Crystal Ball Windows & Doors" />
  <meta property="og:description" content="Structured project support for high-performance window, door, and facade systems." />
  <meta property="og:image" content="img/imperial-aliplast-2.webp" />
  <meta property="og:url" content="https://curious-concha-f11e49.netlify.app/services.html" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Services | Crystal Ball" />
  <meta name="twitter:description" content="Supply, installation, advisory, coordination, and project management support for high-performance envelope projects." />
  <meta name="twitter:image" content="img/imperial-aliplast-2.webp" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: '#FBFBFB', obsidian: '#F9FAFB', graphite: '#F3F4F6', glass: '#9b8e68', frost: '#EAF7FA', silver: '#4D4D4D', line: 'rgba(0,0,0,0.1)', canvas: '#FBFBFB', charcoal: '#4D4D4D', darkheading: '#1A1A1A', accentblue: '#9b8e68' },
      fontFamily: { questrial: ['Montserrat', 'sans-serif'], montserrat: ['Montserrat', 'sans-serif'] },
      boxShadow: { glow: '0 0 25px rgba(107, 114, 128, 0.1)', glass: 'inset 0 0 18px rgba(255,255,255,0.7), 0 18px 60px rgba(0,0,0,0.06)' },
    } } };
  </script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="noise font-questrial">
  <div id="root"></div>

  <script src="shared.js" type="text/babel"></script>

  <script type="text/babel">
    const { TextReveal, Header, Footer, BottomCTA } = window;

    const services = [
      {
        id: 'supply-only',
        name: 'Supply Only',
        eyebrow: '01 / 04',
        intro: 'Ideal for builders with established installation teams. Crystal Ball delivers supply-only support with the technical guidance needed to select, coordinate, and receive the right system package.',
        image: 'img/300-casement-2.webp',
        alt: 'Residential window and sliding door system overlooking a mountain landscape',
        items: [
          'System specification guidance',
          'Technical detailing support',
          'Delivery coordination',
          'Performance-driven consultation',
        ],
      },
      {
        id: 'supply-installation',
        name: 'Supply & Installation',
        eyebrow: '02 / 04',
        intro: 'For clients seeking single-point responsibility, Crystal Ball offers full-scope turn-key delivery executed under our oversight and quality standards.',
        image: 'img/lift-slide-2.webp',
        alt: 'Residential lift-slide door system in a dining room',
        items: [
          'Design assistance and early-stage collaboration',
          'System selection and technical specification',
          'Supply coordination and delivery management',
          'Installation oversight and field coordination',
          'Post-installation support and performance review',
        ],
      },
      {
        id: 'facade-advisory',
        name: 'Facade Advisory & Coordination',
        eyebrow: '03 / 04',
        intro: 'Crystal Ball supports envelope decision-making before small coordination gaps become expensive site problems. We help align design intent, system requirements, sequencing, and install readiness.',
        image: 'img/neo-smart-slide-2.webp',
        alt: 'Residential kitchen with coordinated window and sliding door systems',
        items: [
          'Early-stage design collaboration',
          'Shop drawing review and coordination',
          'Structural and anchoring considerations',
          'Logistics and sequencing planning',
          'Site readiness guidance',
          'Post-installation review',
        ],
      },
      {
        id: 'project-management',
        name: 'Project Management & Advisory',
        eyebrow: '04 / 04',
        intro: 'Whether you need to execute a complete development or require specialized support for an existing team, Crystal Ball provides immediate, on-demand expertise without expanding permanent overhead.',
        image: 'img/energeto-neo-2.webp',
        alt: 'Residential living room with large window system and landscape view',
        items: [
          'Project estimating support',
          'Professional drafting services',
          'Structural engineering coordination',
          'Project management and site coordination',
          'Field-ready installation oversight',
        ],
      },
    ];

    function Row({ children, flip = false, bg = 'bg-canvas', id }) {
      return (
        <section id={id} className={`${bg} w-full`}>
          <div className={`grid grid-cols-1 md:grid-cols-2 ${flip ? 'md:[direction:rtl]' : ''}`}>
            {children}
          </div>
        </section>
      );
    }

    function RowText({ children }) {
      return (
        <div className="md:[direction:ltr] px-6 md:px-14 py-16 md:py-24 flex flex-col justify-center">
          <div className="max-w-xl w-full">{children}</div>
        </div>
      );
    }

    function RowImage({ src, alt = '', bg = 'bg-obsidian' }) {
      return (
        <div className={`${bg} md:[direction:ltr] p-8 md:p-20`}>
          <div className="md:sticky md:top-28">
            <div className="relative w-full aspect-[4/3] overflow-hidden">
              <img src={src} alt={alt} className="absolute inset-0 h-full w-full object-cover" />
            </div>
          </div>
        </div>
      );
    }

    function Eyebrow({ children, light = false }) {
      return (
        <TextReveal>
          <p className={`text-[14px] font-medium tracking-[0.15em] uppercase mb-4 ${light ? 'text-white/70' : 'text-[#9b8e68]'}`}>{children}</p>
        </TextReveal>
      );
    }

    function ServicesHero() {
      return (
        <section className="relative bg-darkheading min-h-[80vh] flex items-end overflow-hidden px-6 md:px-12 pt-32 pb-16 md:pb-20">
          <img
            src="img/imperial-aliplast-2.webp"
            alt="Residential facade with high-performance window and door systems"
            className="absolute inset-0 h-full w-full object-cover opacity-55"
          />
          <div className="absolute inset-0 bg-gradient-to-t from-black/85 via-black/30 to-transparent"></div>

          <div className="relative z-10 max-w-5xl">
            <TextReveal>
              <p className="text-[14px] font-medium tracking-[0.15em] text-white uppercase mb-4">Services</p>
            </TextReveal>
            <TextReveal delay={100}>
              <h1 className="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-light leading-tight text-white">
                Structured for execution.<br/>Supported from design to delivery.
              </h1>
            </TextReveal>
            <TextReveal delay={200}>
              <p className="mt-6 max-w-2xl text-[15px] leading-[1.75] text-white/60">
                Crystal Ball supports facade projects from initial design through to post-installation as a coordinated project partner, not a product catalogue. We do not just deliver product. We support envelope execution.
              </p>
            </TextReveal>
            <TextReveal delay={300}>
              <a href="#services" className="group relative mt-8 inline-flex items-center justify-center overflow-hidden border border-white px-7 py-3 text-[14px] leading-none tracking-[0.09em] uppercase outline-none">
                <span className="absolute inset-0 bg-white -translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.77,0,0.175,1)] group-hover:translate-x-0 z-0"></span>
                <span className="relative z-10 text-white group-hover:text-darkheading transition-colors duration-500">Explore services</span>
              </a>
            </TextReveal>
          </div>
        </section>
      );
    }

    function ServiceIntro() {
      return (
        <section id="services" className="bg-canvas px-6 md:px-14 py-12 md:py-16">
          <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-6">
            <div className="max-w-xl">
              <Eyebrow>Service model</Eyebrow>
              <TextReveal delay={100}>
                <h2 className="text-[22px] sm:text-[28px] md:text-[36px] font-light leading-tight text-[#1A1A1A]">
                  Choose the support level<br/>your project needs.
                </h2>
              </TextReveal>
              <TextReveal delay={200}>
                <p className="mt-5 text-[14px] leading-[1.75] text-[#4D4D4D]/70">
                  From supply-only guidance to full project oversight, Crystal Ball supports the envelope from concept to completion.
                </p>
              </TextReveal>
            </div>
          </div>
        </section>
      );
    }

    function ServiceRow({ service, flip, textBg, imgBg }) {
      return (
        <Row id={service.id} flip={flip} bg={textBg}>
          <RowImage src={service.image} alt={service.alt} bg={imgBg} />
          <RowText>
            <TextReveal>
              <p className="text-[14px] font-medium tracking-[0.15em] text-[#9b8e68] uppercase mb-4">{service.eyebrow}</p>
            </TextReveal>
            <TextReveal delay={100}>
              <h2 className="text-[26px] sm:text-[32px] md:text-[40px] font-light leading-tight text-[#1A1A1A] mb-5">
                {service.name}
              </h2>
            </TextReveal>
            <TextReveal delay={200}>
              <p className="text-[14px] leading-[1.8] text-[#4D4D4D]">{service.intro}</p>
            </TextReveal>
            <TextReveal delay={300}>
              <div className="mt-8">
                <div className="text-[14px] font-semibold tracking-[0.15em] uppercase text-[#1A1A1A] mb-4">We provide</div>
                <ul className="space-y-3">
                  {service.items.map((item) => (
                    <li key={item} className="relative pl-5 text-[14px] leading-[1.7] text-[#4D4D4D]">
                      <span className="absolute left-0 top-[0.85em] h-px w-2 bg-[#9b8e68]"></span>
                      {item}
                    </li>
                  ))}
                </ul>
              </div>
            </TextReveal>
          </RowText>
        </Row>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <Header currentPage="services" />
          <main className="min-h-screen">
            <ServicesHero />
            <ServiceIntro />
            {services.map((service, i) => (
              <ServiceRow
                key={service.id}
                service={service}
                flip={i % 2 === 1}
                textBg={i % 2 === 0 ? 'bg-canvas' : 'bg-obsidian'}
                imgBg={i % 2 === 0 ? 'bg-canvas' : 'bg-obsidian'}
              />
            ))}
            <BottomCTA hideBrowse />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
