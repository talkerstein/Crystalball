<body class="noise font-questrial">
  <div id="root"></div>

  <script src="shared.js" type="text/babel"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { TextReveal, GlassReveal, Header, Footer, ConfiguratorModal, products, propertyImages } = window;

    // Data specific to Homepage
    const showcaseProjects = [
      { id: '82-wilson-ave', title: '82 Wilson Ave.', description: 'Bespoke glazing solutions tailored for luxury custom homes.', image: 'img/82-Wilson-Ave.-Kitchener-Ontario-1.jpeg' },
      { id: 'lakefront-estates', title: 'Lakefront Estates', description: 'Maximizing the view and weather resistance for waterfront properties.', image: 'img/unsplash-1600585154340-be6161a56a0c.jpg' },
      { id: '81-bay-st', title: '81 Bay St.', description: 'High-performance fenestration for multi-story residential developments.', image: 'img/81-Bay-St.-Toronto.jpg' },
      { id: 'forma', title: 'Forma (266 King St. W)', description: 'Engineering striking exteriors with advanced curtain wall assemblies.', image: 'img/Forma-1.jpg' },
      { id: 'woodbine-casino-hotel', title: 'Woodbine Casino Hotel', description: 'Creating inviting and durable environments for hotels and resorts.', image: 'img/Woodbine-Casino-Resort-Toronto-1-.jpg' }
    ];

    // --- HERO
    // Desktop: full-bleed image with text overlaid in the upper area
    //   (anchored to the top of the section so the headline sits over
    //    the sky portion of the image). All text is white.
    // Mobile: stacked — image on top (55vh), text block below on white.
    // CTA: warm-tan at 80% opacity so a hint of the image bleeds through.
    function Hero() {
      const heroCta = (onDark) => (
        <a href="portfolio.html" className="group relative inline-flex items-center justify-center overflow-hidden bg-[#9b8e68]/80 px-8 py-3.5 text-[14px] tracking-[0.2em] uppercase outline-none">
          <span className="absolute inset-0 bg-darkheading -translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.77,0,0.175,1)] group-hover:translate-x-0 z-0"></span>
          <span className="relative z-10 text-white transition-colors duration-500">EXPLORE OUR WORK</span>
        </a>
      );

      return (
        <section className="relative bg-darkheading">
          {/* Desktop — text overlays the image, top-anchored over the sky */}
          <div className="hidden lg:block relative min-h-screen">
            <img className="absolute inset-0 h-full w-full object-cover" src="img/hero.webp" alt="" />
            <div className="relative z-10 mx-auto max-w-7xl min-h-screen flex items-start px-6 pt-32 pb-16">
              <div className="max-w-xl text-left">
                <TextReveal delay={200}><h1 className="text-5xl md:text-6xl xl:text-7xl font-light leading-[1.05] tracking-tight text-white">Vision in<br />every detail</h1></TextReveal>
                <TextReveal delay={400}><div className="my-8 h-px w-16 bg-white/60"></div></TextReveal>
                <TextReveal delay={500}><p className="max-w-md text-lg text-white/90 leading-relaxed">Premium window and door solutions for contemporary homes and commercial projects.</p></TextReveal>
                <TextReveal delay={600} className="w-fit">
                  <div className="mt-10">{heroCta(true)}</div>
                </TextReveal>
              </div>
            </div>
          </div>

          {/* Mobile — image on top, text block below on white */}
          <div className="lg:hidden">
            <div className="relative h-[55vh]">
              <img src="img/hero.webp" alt="Modern home with infinity pool overlooking a mountain valley" className="absolute inset-0 h-full w-full object-cover" />
            </div>
            <div className="bg-white px-6 py-16">
              <div className="max-w-xl">
                <TextReveal delay={0}><h1 className="text-4xl sm:text-5xl font-light leading-[1.05] tracking-wide sm:tracking-[0.12em] text-[#1A1A1A]">Vision in<br />every detail</h1></TextReveal>
                <TextReveal delay={200}><div className="my-6 h-px w-16 bg-[#9b8e68]"></div></TextReveal>
                <TextReveal delay={300}><p className="max-w-md text-base sm:text-lg text-[#1A1A1A]/85 leading-relaxed">Premium window and door solutions for contemporary homes and commercial projects.</p></TextReveal>
                <TextReveal delay={400}>
                  <div className="mt-8 w-fit">{heroCta(false)}</div>
                </TextReveal>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // --- BRAND LOGOS STRIP ---
    // Sits between the hero and the products accordion. No label by
    // design — the strip carries partner/manufacturer marks only.
    // Renders six neutral wordmark placeholders for now; swap each
    // inner div for an <img src="img/brand-XX.svg" alt="…"> when the
    // client delivers real assets. Light bg breaks from the dark hero
    // above and leads into the light MechanismAccordion below.
    function BrandLogos() {
      const placeholders = ['LOGO 01', 'LOGO 02', 'LOGO 03', 'LOGO 04', 'LOGO 05', 'LOGO 06'];
      return (
        <section className="bg-white border-b border-black/10 px-6 py-14 relative z-10">
          <div className="mx-auto max-w-7xl">
            <div className="grid grid-cols-3 md:grid-cols-6 gap-x-8 gap-y-10 md:gap-12 items-center">
              {placeholders.map((label) => (
                <div
                  key={label}
                  className="flex h-12 items-center justify-center bg-black/[0.03] text-[11px] font-bold tracking-[0.3em] text-black/35 uppercase hover:text-black/60 hover:bg-black/[0.05] transition-colors"
                >
                  {label}
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // --- INTRO (v2 copy) ---
    function HomeIntro() {
      return (
        <section className="bg-darkheading px-6 py-28 relative z-10">
          <div className="mx-auto max-w-7xl text-left">
            <TextReveal>
              <p className="text-[14px] tracking-[0.2em] text-[#9b8e68] uppercase mb-6">EUROPEAN PERFORMANCE</p>
            </TextReveal>
            <TextReveal>
              <h2 className="text-3xl font-light text-white md:text-5xl mb-8 max-w-4xl">Delivered with project intelligence.</h2>
            </TextReveal>
            <TextReveal delay={100}>
              <p className="text-[16px] leading-8 text-white/75 mb-6 max-w-3xl">
                Crystal Ball Windows & Doors supplies high-performance European window, door, and facade systems to the Canadian market, backed by more than two decades of building envelope and curtain wall experience.
              </p>
            </TextReveal>
            <TextReveal delay={200}>
              <p className="text-[16px] leading-8 text-white/75 max-w-3xl">
                We work with commercial developers, general contractors, custom home builders, architects, and regional dealers who need premium-performance systems supported by real construction knowledge.
              </p>
            </TextReveal>
          </div>
        </section>
      );
    }

    // --- TESTIMONIALS ---
    // 2-col layout: eyebrow + h2 + prev/next arrows on the left, two
    // visible cards on the right. Light section (bg-ink) so it lifts
    // out of the dark HomeIntro above and leads into the light
    // HomeCapabilities below. Placeholder names/titles and lorem ipsum
    // copy — swap into the `testimonials` array when real quotes land.
    function Testimonials() {
      const testimonials = [
        {
          name: 'Alex Shikhman',
          role: 'Owner, BESI',
          quote: 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua ut enim ad minim veniam.',
        },
        {
          name: 'David Li',
          role: 'Superintendent, EllisDon',
          quote: 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Praesent commodo cursus magna, vel scelerisque nisl consectetur et augue magnis.',
        },
        {
          name: 'Boris Friedman',
          role: 'Senior Project Manager, Harmon',
          quote: 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Vestibulum id ligula porta felis euismod semper a dolor sit amet ipsum.',
        },
        {
          name: 'Roy Segal',
          role: 'Owner, Segal Homes',
          quote: 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aenean lacinia bibendum nulla sed consectetur sociis natoque penatibus.',
        },
      ];

      const [startIdx, setStartIdx] = useState(0);
      const visibleCount = 2;
      const maxStart = Math.max(0, testimonials.length - visibleCount);
      const prev = () => setStartIdx((i) => Math.max(0, i - 1));
      const next = () => setStartIdx((i) => Math.min(maxStart, i + 1));
      const visible = testimonials.slice(startIdx, startIdx + visibleCount);

      return (
        <section className="bg-ink px-6 py-28 relative z-10">
          <div className="mx-auto max-w-7xl grid gap-12 md:gap-16 md:grid-cols-[1fr_2fr] items-start">
            {/* Left: eyebrow + h2 + nav arrows */}
            <div>
              <TextReveal>
                <p className="text-[14px] tracking-[0.2em] text-[#9b8e68] uppercase mb-6">FROM THE FIELD</p>
              </TextReveal>
              <TextReveal>
                <h2 className="text-3xl font-light text-[#1A1A1A] md:text-5xl mb-10 leading-tight">
                  Specified once.<br />
                  <span className="text-[#9b8e68]">Trusted on the next one.</span>
                </h2>
              </TextReveal>
              <TextReveal delay={100}>
                <div className="flex gap-4">
                  <button
                    onClick={prev}
                    disabled={startIdx === 0}
                    aria-label="Previous testimonial"
                    className="flex h-10 w-10 items-center justify-center text-[#9b8e68] hover:text-[#1A1A1A] transition-colors disabled:opacity-30 disabled:cursor-not-allowed outline-none"
                  >
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="h-5 w-5">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                    </svg>
                  </button>
                  <button
                    onClick={next}
                    disabled={startIdx === maxStart}
                    aria-label="Next testimonial"
                    className="flex h-10 w-10 items-center justify-center text-[#9b8e68] hover:text-[#1A1A1A] transition-colors disabled:opacity-30 disabled:cursor-not-allowed outline-none"
                  >
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="h-5 w-5">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
                    </svg>
                  </button>
                </div>
              </TextReveal>
            </div>

            {/* Right: two visible testimonials — plain text, no card chrome. */}
            <div className="grid gap-10 md:grid-cols-2">
              {visible.map((t, i) => (
                <TextReveal key={`${t.name}-${startIdx}`} delay={i * 100}>
                  <div className="h-full">
                    <p className="text-[15px] font-bold text-[#1A1A1A]">{t.name}</p>
                    <p className="text-[13px] text-[#4D4D4D]/70 mt-1 mb-6">{t.role}</p>
                    <p className="text-[14px] leading-7 text-[#4D4D4D]">{t.quote}</p>
                  </div>
                </TextReveal>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // --- CAPABILITIES (v2 copy) ---
    function HomeCapabilities() {
      return (
        <section className="bg-obsidian px-6 py-28 relative border-b border-black/10 z-10">
          <div className="mx-auto max-w-7xl grid gap-16 md:grid-cols-2">
            <div>
              <TextReveal><h3 className="text-2xl font-light text-[#1A1A1A] mb-8">What We Do</h3></TextReveal>
              <ul className="space-y-4">
                <TextReveal delay={100}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span> High-performance European-style windows</li></TextReveal>
                <TextReveal delay={200}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span> Architectural door systems</li></TextReveal>
                <TextReveal delay={300}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span> Curtain wall and storefront solutions</li></TextReveal>
                <TextReveal delay={400}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span> Technical and facade-level project support</li></TextReveal>
              </ul>
            </div>
            <div>
              <TextReveal><h3 className="text-2xl font-light text-[#1A1A1A] mb-8">Built for Performance. Structured for Execution.</h3></TextReveal>
              <TextReveal delay={100}><p className="text-[15px] font-medium text-[#4D4D4D]/80 mb-6">Our systems are engineered to meet the demands of:</p></TextReveal>
              <ul className="space-y-4 mb-8">
                <TextReveal delay={200}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span> Net Zero and high-efficiency construction</li></TextReveal>
                <TextReveal delay={300}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span> Extreme Canadian climate conditions</li></TextReveal>
                <TextReveal delay={400}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span> Large-format architectural openings</li></TextReveal>
                <TextReveal delay={500}><li className="flex items-start text-[15px] font-medium text-[#4D4D4D]"><span className="mr-3 mt-1 text-glass">■</span> Restoration and performance upgrades on existing buildings</li></TextReveal>
              </ul>
              <TextReveal delay={600}><p className="text-[15px] font-bold text-[#1A1A1A]">We don't simply supply windows. We support the building envelope from concept to completion.</p></TextReveal>
            </div>
          </div>
        </section>
      );
    }

    // --- MECHANISM ACCORDION: products grouped by how they operate.
    // 2-column layout on desktop: accordion rows on the left, a sticky
    // image column on the right that fades between mechanism images as
    // the open row changes. Mobile collapses to a single column with no
    // image (users tap through to individual product pages for visuals).
    // Reads window.location.hash on mount so deep links can pre-open
    // a specific mechanism row (e.g. `#mechanism-tilt-turn`).
    function MechanismAccordion() {
      const mechanisms = [
        {
          id: 'tilt-turn',
          name: 'Tilt & Turn',
          tagline: 'The European default. Inward-opening, dual-operation, superior air sealing — the first-choice system for Passive House and high-performance residential or light commercial.',
          featureImage: 'img/al_063.20-1920x1040.jpg.webp',
        },
        {
          id: 'casement-awning-fixed',
          name: 'Casement, Awning & Fixed',
          tagline: 'North American configurations at European performance levels. Side-hinged casements, top-hinged awnings, and large-format fixed glazing.',
          featureImage: 'img/fiberglass-triple-glazed-windows-and-doors-800x500-1.jpg',
        },
        {
          id: 'lift-slide',
          name: 'Lift & Slide',
          tagline: 'Multi-panel glazed walls that operate at scale. The lift mechanism frees the rollers and drops a perfect weather seal in the closed position.',
          featureImage: 'img/shutterstock_552591889.webp',
        },
        {
          id: 'sliding-folding',
          name: 'Sliding & Folding',
          tagline: 'From minimal-frame patio doors to multi-panel accordion walls — seamless indoor-outdoor flow at residential and light-commercial scale.',
          featureImage: 'img/Panorama.webp',
        },
        {
          id: 'entry-swing',
          name: 'Entry & Swing Doors',
          tagline: 'Premium entrance systems with thermal continuity, multi-point hardware, and architectural integration. Aluminum and fiberglass options.',
          featureImage: 'img/TERTIAIRES1-scaled-1.webp',
        },
        {
          id: 'curtain-wall',
          name: 'Curtain Wall',
          tagline: 'Stick-built and unitized commercial assemblies, storefront, and custom facade configurations. Engineered for structural, thermal, and acoustic performance.',
          featureImage: 'img/j-nadl-2341-1620x1080.jpg.webp',
        },
      ];

      const [openMechanism, setOpenMechanism] = useState(mechanisms[0].name);

      // Honor deep-links from the mega menu / external referrers.
      useEffect(() => {
        const hash = (window.location.hash || '').replace('#mechanism-', '').replace('#', '');
        const match = mechanisms.find(m => m.id === hash);
        if (match) setOpenMechanism(match.name);
      }, []);

      return (
        <section id="systems" className="bg-ink px-6 py-28 z-10">
          <div className="mx-auto max-w-7xl">
            <div className="mb-14">
              <TextReveal delay={0}><p className="text-[14px] tracking-[0.2em] text-glass uppercase">PRODUCT SYSTEMS</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-5 text-4xl sm:text-5xl md:text-6xl font-light text-[#4D4D4D] max-w-3xl">Explore the catalog by how it opens.</h2></TextReveal>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-[1fr_1.1fr] gap-8 md:gap-16">
              {/* LEFT: accordion rows */}
              <div className="border-t border-black/10">
                {mechanisms.map((mech) => {
                  const mechProducts = products.filter(p => p.mechanism === mech.name);
                  const isOpen = openMechanism === mech.name;
                  return (
                    <div key={mech.id} id={`mechanism-${mech.id}`} className="border-b border-black/10 scroll-mt-28">
                      <button
                        type="button"
                        onClick={() => setOpenMechanism(isOpen ? null : mech.name)}
                        className="w-full flex items-center justify-between py-6 md:py-7 group outline-none text-left"
                        aria-expanded={isOpen}
                      >
                        <div className="flex items-baseline gap-3 md:gap-6 flex-wrap">
                          <h3 className={`text-2xl md:text-3xl font-light transition-colors ${isOpen ? 'text-[#1A1A1A]' : 'text-[#4D4D4D] group-hover:text-[#1A1A1A]'}`}>
                            {mech.name}
                          </h3>
                          <span className="text-[11px] tracking-[0.25em] text-glass uppercase">
                            {mechProducts.length} {mechProducts.length === 1 ? 'system' : 'systems'}
                          </span>
                        </div>
                        <span className={`shrink-0 ml-4 text-xl md:text-2xl transition-transform duration-300 ${isOpen ? 'rotate-45 text-[#1A1A1A]' : 'text-[#4D4D4D] group-hover:text-[#1A1A1A]'}`}>+</span>
                      </button>

                      <div className={`grid transition-all duration-500 ease-out ${isOpen ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'}`}>
                        <div className="overflow-hidden">
                          <div className="pb-8 pt-2">
                            <p className="text-[15px] leading-7 text-[#4D4D4D]/85 mb-6 max-w-lg">
                              {mech.tagline}
                            </p>
                            <ul>
                              {mechProducts.map((p) => (
                                <li key={p.id}>
                                  <a href={`${p.id}.html`} className="group/p flex items-baseline justify-between border-t border-black/10 py-3 transition hover:border-glass">
                                    <span className="text-[15px] text-[#4D4D4D] group-hover/p:text-[#1A1A1A]">{p.name}</span>
                                    <span className="text-[11px] tracking-[0.2em] text-glass uppercase shrink-0 ml-4 hidden sm:inline">{p.tag}</span>
                                  </a>
                                </li>
                              ))}
                            </ul>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* RIGHT: sticky image column — desktop only, fades between mechanism images.
                  h-full + relative on the wrapper so the inner sticky element has a
                  taller-than-itself container to stick within for the full accordion height. */}
              <div className="hidden md:block h-full relative">
                <div className="sticky top-[120px] h-[560px] overflow-hidden">
                  {mechanisms.map((mech) => (
                    <img
                      key={mech.id}
                      src={mech.featureImage}
                      alt={mech.name}
                      className={`absolute inset-0 h-full w-full object-cover transition-opacity duration-700 ${openMechanism === mech.name ? 'opacity-100' : 'opacity-0'}`}
                    />
                  ))}
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // --- MARKETS WE SERVE — image on the left, content on the right.
    // Within the content column, the four market links sit in a 2x2 grid
    // with internal divider lines (vertical between columns, horizontal
    // between rows) for a clean ledger feel.
    function HomeMarketsSummary() {
      const markets = [
        { title: 'Commercial Developers & GCs', desc: 'High-performance windows, storefront, and curtain wall for mid-rise, mixed-use, and Net Zero builds across Canada.', href: 'commercial-developers.html' },
        { title: 'Architects & Custom Builders', desc: 'Tilt & Turn, Lift & Slide, and large-format glazing engineered for Passive House and modern residential.', href: 'architects-custom-builders.html' },
        { title: 'Dealer Partnerships', desc: 'Premium European systems supplied to regional Canadian dealers with project-level technical support.', href: 'dealer-partnerships.html' },
      ];
      return (
        <section className="bg-darkheading px-6 py-28 relative z-10">

    // --- EXISTING PORTFOLIO SCROLL SHOWCASE ---
    function Projects() {
      const [activeProject, setActiveProject] = React.useState(0);
      const [prevProject, setPrevProject] = React.useState(0);
      const [hasEntered, setHasEntered] = React.useState(false);
      const sectionRef = React.useRef(null);
      const activeProjectRef = React.useRef(0);

      React.useEffect(() => {
        const handleScroll = () => {
          if (!sectionRef.current) return;
          const rect = sectionRef.current.getBoundingClientRect();
          if (rect.top <= window.innerHeight * 0.75 && !hasEntered) setHasEntered(true);
          let progress = Math.min(Math.max((-(rect.top - 89) / (rect.height - window.innerHeight)), 0), 0.999);
          const index = Math.floor(progress * showcaseProjects.length);
          if (index !== activeProjectRef.current && index >= 0) {
            setPrevProject(activeProjectRef.current);
            activeProjectRef.current = index;
            setActiveProject(index);
          }
        };
        window.addEventListener('scroll', handleScroll);
        handleScroll();
        return () => window.removeEventListener('scroll', handleScroll);
      }, [hasEntered]);

      const currentProject = showcaseProjects[activeProject];
      const previousProject = showcaseProjects[prevProject];

      return (
        <section ref={sectionRef} className="relative bg-ink" style={{ height: `calc(${showcaseProjects.length * 100}vh + 89px)` }}>
          <div className="sticky top-[89px] flex h-[calc(100vh-89px)] flex-col items-center justify-center overflow-hidden bg-ink py-6">
            <div className="absolute inset-0">
              <img src={previousProject.image} className="absolute inset-0 h-full w-full object-cover" />
              {hasEntered && (
                <div key={`bg-wipe-${activeProject}`} className="absolute inset-0">
                  <div className="absolute inset-y-0 left-0 w-full overflow-hidden animate-[wipeReveal_1.2s_cubic-bezier(0.77,0,0.175,1)_forwards]">
                    <img src={currentProject.image} className="absolute inset-0 h-full w-full object-cover" />
                  </div>
                </div>
              )}
              {/* Dark scrim for text legibility — gradient from bottom up.
                  Replaces the previous white wash + glass frame combo. */}
              <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-black/40 to-black/20"></div>
            </div>
            <div className="relative z-10 flex w-full flex-col items-center px-6 text-center">
              <div className="relative border border-white/20 p-2 md:p-3">
                <div className="relative h-[240px] w-[90vw] max-w-[760px] overflow-hidden md:h-[400px]">
                  <img src={previousProject.image} className="absolute inset-0 h-full w-full object-cover" />
                  {hasEntered && (
                    <div key={`wipe-container-${activeProject}`} className="absolute inset-0">
                      <div className="absolute inset-y-0 left-0 w-full overflow-hidden animate-[wipeReveal_1.4s_cubic-bezier(0.77,0,0.175,1)_0.3s_both]">
                        <img src={currentProject.image} className="absolute inset-0 h-full w-full object-cover" />
                      </div>
                    </div>
                  )}
                </div>
              </div>
              <div className="relative mt-8 max-w-3xl overflow-hidden px-4 text-center">
                <div key={`text-${activeProject}`} className="animate-[textReveal_0.8s_ease_0.4s_both]">
                  <h2 className="text-3xl tracking-wide text-white md:text-5xl">{currentProject.title}</h2>
                  <p className="mx-auto mt-4 max-w-2xl text-[15px] leading-7 text-white/85 md:text-lg">{currentProject.description}</p>
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // --- LIFECYCLE: process section rebuilt as a two-column block —

    }

    // --- EXISTING INSTAGRAM CAROUSEL ---
    function InstagramCarousel() {
      const carouselRef = React.useRef(null);
      const animationRef = React.useRef(null);
      const exactScrollRef = React.useRef(0);
      const isDraggingRef = React.useRef(false);
      const startXRef = React.useRef(0);
      const startScrollRef = React.useRef(0);
      const [isDraggingState, setIsDraggingState] = React.useState(false);
      const posts = [...propertyImages, ...propertyImages, ...propertyImages];

      React.useEffect(() => {
        const animate = () => {
          if (carouselRef.current) {
            if (!isDraggingRef.current) {
              exactScrollRef.current += 0.35;
              if (exactScrollRef.current >= carouselRef.current.scrollWidth - carouselRef.current.clientWidth) exactScrollRef.current = 0;
              carouselRef.current.scrollLeft = exactScrollRef.current;
            }
          }
          animationRef.current = requestAnimationFrame(animate);
        };
        animationRef.current = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(animationRef.current);
      }, []);

      const handleMouseDown = (e) => { isDraggingRef.current = true; setIsDraggingState(true); startXRef.current = e.pageX - carouselRef.current.offsetLeft; startScrollRef.current = exactScrollRef.current; };
      const handleMouseLeaveOrUp = () => { isDraggingRef.current = false; setIsDraggingState(false); };
      const handleMouseMove = (e) => {
        if (!isDraggingRef.current || !carouselRef.current) return;
        e.preventDefault();
        const walk = (e.pageX - carouselRef.current.offsetLeft - startXRef.current) * 2.4;
        exactScrollRef.current = startScrollRef.current - walk;
        if (exactScrollRef.current < 0) exactScrollRef.current = 0;
        if (exactScrollRef.current >= carouselRef.current.scrollWidth - carouselRef.current.clientWidth) exactScrollRef.current = carouselRef.current.scrollWidth - carouselRef.current.clientWidth;
        carouselRef.current.scrollLeft = exactScrollRef.current;
      };

      return (
        <section id="instagram" className="overflow-hidden border-y border-black/10 bg-obsidian py-24 relative">
          <div className="relative z-10">
            <div className="mx-auto mb-12 flex max-w-7xl flex-col justify-between gap-5 px-6 md:flex-row md:items-end">
              <div>
                <TextReveal delay={0}><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">@CRYSTALBALLWINDOWS</p></TextReveal>
                <TextReveal delay={100}><h2 className="mt-5 text-4xl font-light text-[#4D4D4D] md:text-6xl">From the installation feed.</h2></TextReveal>
              </div>
              <TextReveal delay={200}><a href="#" className="text-[14px] font-bold tracking-[0.2em] text-darkheading uppercase hover:underline md:pb-2">FOLLOW THE WORK →</a></TextReveal>
            </div>
            <GlassReveal delay={300} className="w-full">
              <div ref={carouselRef} onMouseDown={handleMouseDown} onMouseLeave={handleMouseLeaveOrUp} onMouseUp={handleMouseLeaveOrUp} onMouseMove={handleMouseMove} className={`flex overflow-x-auto scrollbar-hide gap-5 px-6 pb-4 select-none ${isDraggingState ? 'cursor-grabbing' : 'cursor-[ew-resize]'}`} style={{ scrollbarWidth: 'none' }}>
                {posts.map((image, index) => (
                  <div key={index} className="group relative h-96 w-80 shrink-0 overflow-hidden border border-black/10 hover:border-glass bg-white cursor-inherit transition-colors duration-300">
                    <img src={image} className="absolute inset-0 h-full w-full object-cover transition duration-500 group-hover:scale-110" />
                    <div className="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-white via-white/40 to-transparent opacity-0 transition duration-300 group-hover:opacity-100 pointer-events-none"></div>
                    <div className="absolute bottom-0 left-0 right-0 translate-y-6 p-6 opacity-0 transition duration-300 group-hover:translate-y-0 group-hover:opacity-100 border-t border-black/10 bg-white pointer-events-none">
                      <p className="text-[14px] leading-6 text-[#1A1A1A] font-medium">Minimal frame alignment, glass reflection check, and final hardware calibration.</p>
                    </div>
                  </div>
                ))}
              </div>
            </GlassReveal>
          </div>
        </section>
      );
    }
