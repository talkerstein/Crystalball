    // --- EXISTING PORTFOLIO SCROLL SHOWCASE ---
    function Projects() {
      const [activeProject, setActiveProject] = React.useState(0);
      const [prevProject, setPrevProject] = React.useState(0);
      const [hasEntered, setHasEntered] = React.useState(false);
      const sectionRef = React.useRef(null);
      const activeProjectRef = React.useRef(0);

      React.useEffect(() => {
        const handleScroll = () => {
          if (!sectionRef.current) return;
          const rect = sectionRef.current.getBoundingClientRect();
          if (rect.top <= window.innerHeight * 0.75 && !hasEntered) setHasEntered(true);
          let progress = Math.min(Math.max((-(rect.top - 89) / (rect.height - window.innerHeight)), 0), 0.999);
          const index = Math.floor(progress * showcaseProjects.length);
          if (index !== activeProjectRef.current && index >= 0) {
            setPrevProject(activeProjectRef.current);
            activeProjectRef.current = index;
            setActiveProject(index);
          }
        };
        window.addEventListener('scroll', handleScroll);
        handleScroll();
        return () => window.removeEventListener('scroll', handleScroll);
      }, [hasEntered]);

      const currentProject = showcaseProjects[activeProject];
      const previousProject = showcaseProjects[prevProject];

      return (
        <section ref={sectionRef} className="relative bg-ink" style={{ height: `calc(${showcaseProjects.length * 100}vh + 89px)` }}>
          <div className="sticky top-[89px] flex h-[calc(100vh-89px)] flex-col items-center justify-center overflow-hidden bg-ink py-6">
            <div className="absolute inset-0">
              <img src={previousProject.image} className="absolute inset-0 h-full w-full object-cover" />
              {hasEntered && (
                <div key={`bg-wipe-${activeProject}`} className="absolute inset-0">
                  <div className="absolute inset-y-0 left-0 w-full overflow-hidden animate-[wipeReveal_1.2s_cubic-bezier(0.77,0,0.175,1)_forwards]">
                    <img src={currentProject.image} className="absolute inset-0 h-full w-full object-cover" />

              )}

                  Replaces the previous white wash + glass frame combo. */}

            </div>
            <div className="relative z-10 flex w-full flex-col items-center px-6 text-center">
              <div className="relative border border-white/20 p-2 md:p-3">
                <div className="relative h-[240px] w-[90vw] max-w-[760px] overflow-hidden md:h-[400px]">
                  <img src={previousProject.image} className="absolute inset-0 h-full w-full object-cover" />

                    <div key={`wipe-container-${activeProject}`} className="absolute inset-0">
                      <div className="absolute inset-y-0 left-0 w-full overflow-hidden animate-[wipeReveal_1.4s_cubic-bezier(0.77,0,0.175,1)_0.3s_both]">
                        <img src={currentProject.image} className="absolute inset-0 h-full w-full object-cover" />
                      </div>
                    </div>
                  )}
                </div>
              </div>
              <div className="relative mt-8 max-w-3xl overflow-hidden px-4 text-center">
                <div key={`text-${activeProject}`} className="animate-[textReveal_0.8s_ease_0.4s_both]">
                  <h2 className="text-3xl tracking-wide text-white md:text-5xl">{currentProject.title}</h2>
                  <p className="mx-auto mt-4 max-w-2xl text-[15px] leading-7 text-white/85 md:text-lg">{currentProject.description}</p>

    // --- EXISTING INSTAGRAM CAROUSEL ---
    function InstagramCarousel() {
      const carouselRef = React.useRef(null);
      const animationRef = React.useRef(null);
      const exactScrollRef = React.useRef(0);
      const isDraggingRef = React.useRef(false);
      const startXRef = React.useRef(0);
      const startScrollRef = React.useRef(0);
      const [isDraggingState, setIsDraggingState] = React.useState(false);
      const posts = [...propertyImages, ...propertyImages, ...propertyImages];

      React.useEffect(() => {
        const animate = () => {
          if (carouselRef.current) {
            if (!isDraggingRef.current) {
              exactScrollRef.current += 0.35;
              if (exactScrollRef.current >= carouselRef.current.scrollWidth - carouselRef.current.clientWidth) exactScrollRef.current = 0;
              carouselRef.current.scrollLeft = exactScrollRef.current;
            }
          }
          animationRef.current = requestAnimationFrame(animate);
        };
        animationRef.current = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(animationRef.current);
      }, []);

      const handleMouseDown = (e) => { isDraggingRef.current = true; setIsDraggingState(true); startXRef.current = e.pageX - carouselRef.current.offsetLeft; startScrollRef.current = exactScrollRef.current; };
      const handleMouseLeaveOrUp = () => { isDraggingRef.current = false; setIsDraggingState(false); };
      const handleMouseMove = (e) => {
        if (!isDraggingRef.current || !carouselRef.current) return;
        e.preventDefault();
        const walk = (e.pageX - carouselRef.current.offsetLeft - startXRef.current) * 2.4;
        exactScrollRef.current = startScrollRef.current - walk;
        if (exactScrollRef.current < 0) exactScrollRef.current = 0;
        if (exactScrollRef.current >= carouselRef.current.scrollWidth - carouselRef.current.clientWidth) exactScrollRef.current = carouselRef.current.scrollWidth - carouselRef.current.clientWidth;
        carouselRef.current.scrollLeft = exactScrollRef.current;
      };

      return (
        <section id="instagram" className="overflow-hidden border-y border-black/10 bg-obsidian py-24 relative">
          <div className="relative z-10">
            <div className="mx-auto mb-12 flex max-w-7xl flex-col justify-between gap-5 px-6 md:flex-row md:items-end">
              <div>
                <TextReveal delay={0}><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">@CRYSTALBALLWINDOWS</p></TextReveal>
                <TextReveal delay={100}><h2 className="mt-5 text-4xl font-light text-[#4D4D4D] md:text-6xl">From the installation feed.</h2></TextReveal>
              </div>
              <TextReveal delay={200}><a href="#" className="text-[14px] font-bold tracking-[0.2em] text-darkheading uppercase hover:underline md:pb-2">FOLLOW THE WORK →</a></TextReveal>
            </div>
            <GlassReveal delay={300} className="w-full">
              <div ref={carouselRef} onMouseDown={handleMouseDown} onMouseLeave={handleMouseLeaveOrUp} onMouseUp={handleMouseLeaveOrUp} onMouseMove={handleMouseMove} className={`flex overflow-x-auto scrollbar-hide gap-5 px-6 pb-4 select-none ${isDraggingState ? 'cursor-grabbing' : 'cursor-[ew-resize]'}`} style={{ scrollbarWidth: 'none' }}>
                {posts.map((image, index) => (
                  <div key={index} className="group relative h-96 w-80 shrink-0 overflow-hidden border border-black/10 hover:border-glass bg-white cursor-inherit transition-colors duration-300">
                    <img src={image} className="absolute inset-0 h-full w-full object-cover transition duration-500 group-hover:scale-110" />
                    <div className="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-white via-white/40 to-transparent opacity-0 transition duration-300 group-hover:opacity-100 pointer-events-none"></div>
                    <div className="absolute bottom-0 left-0 right-0 translate-y-6 p-6 opacity-0 transition duration-300 group-hover:translate-y-0 group-hover:opacity-100 border-t border-black/10 bg-white pointer-events-none">
                      <p className="text-[14px] leading-6 text-[#1A1A1A] font-medium">Minimal frame alignment, glass reflection check, and final hardware calibration.</p>
                    </div>
                  </div>
                ))}
              </div>
            </GlassReveal>
          </div>
        </section>
      );
    }

    // --- CONTACT (v2 copy) ---
    function HomeContact() {
      return (
        <section id="contact" className="relative bg-ink px-6 py-28 border-t border-black/10 z-10">
          <div className="mx-auto grid max-w-7xl gap-10 lg:grid-cols-2">
            <div>
              <TextReveal delay={0}><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">START A PROJECT</p></TextReveal>
              <TextReveal delay={100}><h2 className="mt-5 text-5xl font-light leading-tight text-[#4D4D4D] md:text-7xl">Let's build with performance in mind.</h2></TextReveal>
              <TextReveal delay={200}><p className="mt-6 text-lg text-charcoal leading-relaxed font-medium">Whether you are developing a commercial project, building a custom home, or exploring a dealer partnership, our team is ready to support your project.</p></TextReveal>
              <TextReveal delay={300}>
                <a href="contact.html" className="mt-10 inline-block border border-darkheading bg-darkheading px-8 py-4 text-center text-[14px] font-bold tracking-[0.2em] text-white hover:bg-charcoal transition uppercase outline-none shadow-sm">
                  START A PROJECT INQUIRY →
                </a>
              </TextReveal>
            </div>
          </div>
        </section>
      );
    }

    function App() {
      const [modalOpen, setModalOpen] = useState(false);
      const [modalProduct, setModalProduct] = useState('');

      const handleRequestQuote = (name) => {
        setModalProduct(name);
        setModalOpen(true);
      };

      return (
        <React.Fragment>
          <Header currentPage="home" />
          <main className="min-h-screen">
            <Hero />
            <HomeIntro />
            <MechanismAccordion />
            <Projects />
            <HomeCapabilities />
            <HomeMarketsSummary />
            <HomeLifecycle />
            <InstagramCarousel />
            <HomeContact />
          </main>
          <Footer />
          <ConfiguratorModal
            isOpen={modalOpen}

          />

      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
