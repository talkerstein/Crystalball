<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policy | Crystal Ball Windows & Doors</title>
  <meta name="description" content="Crystal Ball Windows & Doors privacy policy. How we collect, use, and protect information submitted through our website." />
  <meta name="robots" content="noindex,follow" />

  <link rel="icon" type="image/png" href="img/Crystal-Ball-Full-Color-Vertical-scaled.png" />
  <link rel="apple-touch-icon" href="img/Crystal-Ball-Full-Color-Vertical-scaled.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { ink: '#F2EDE9', obsidian: '#F9FAFB', graphite: '#F3F4F6', glass: '#6B7280', frost: '#EAF7FA', silver: '#4D4D4D', line: 'rgba(0,0,0,0.1)', canvas: '#F2EDE9', charcoal: '#4D4D4D', darkheading: '#1A1A1A', accentblue: '#6B7280' },
      fontFamily: { montserrat: ['Montserrat', 'sans-serif'] },
      boxShadow: { glow: '0 0 25px rgba(107, 114, 128, 0.1)', glass: 'inset 0 0 18px rgba(255,255,255,0.7), 0 18px 60px rgba(0,0,0,0.06)' },
    } } };
  </script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="noise font-montserrat">
  <div id="root"></div>

  <script src="shared.js" type="text/babel"></script>

  <script type="text/babel">
    const { TextReveal, Header, Footer } = window;

    function PrivacyPage() {
      return (
        <section className="relative bg-canvas min-h-screen pt-32 pb-20 px-6">
          <div className="mx-auto max-w-3xl relative z-10">
            <TextReveal><p className="text-[14px] font-bold tracking-[0.2em] text-glass uppercase">PRIVACY POLICY</p></TextReveal>
            <TextReveal delay={100}><h1 className="mt-5 text-4xl font-light leading-[1.1] tracking-[0.06em] md:text-6xl text-[#4D4D4D]">Privacy Policy.</h1></TextReveal>
            <TextReveal delay={200}><div className="my-8 h-1 w-16 bg-[#4D4D4D]/80"></div></TextReveal>
            <TextReveal delay={300}><p className="text-[15px] text-[#4D4D4D]/70 font-medium">Last updated: May 2026 — Placeholder text. Replace with legal-reviewed copy before launch.</p></TextReveal>

            <div className="mt-12 space-y-10 text-[15px] leading-8 text-[#4D4D4D]">
              <div>
                <h2 className="text-2xl font-light text-[#1A1A1A] mb-4">Overview</h2>
                <p>Crystal Ball Windows & Doors Ltd. ("Crystal Ball", "we", "us") operates this website. This privacy policy describes the information we collect, how we use it, and the choices you have regarding it.</p>
              </div>

              <div>
                <h2 className="text-2xl font-light text-[#1A1A1A] mb-4">Information We Collect</h2>
                <p className="mb-4">When you submit an inquiry through our contact form, we collect:</p>
                <ul className="space-y-2 ml-5">
                  <li className="flex items-start"><span className="mr-3 mt-2 text-glass">■</span>Your name, email address, phone number, and company (where provided)</li>
                  <li className="flex items-start"><span className="mr-3 mt-2 text-glass">■</span>Project details you choose to share (location, scope, timeline, drawings)</li>
                  <li className="flex items-start"><span className="mr-3 mt-2 text-glass">■</span>Inquiry type and the message content</li>
                </ul>
                <p className="mt-4">We also receive standard server logs from our hosting provider (Netlify), which may include IP address, browser, and pages visited. We do not use these logs for marketing.</p>
              </div>

              <div>
                <h2 className="text-2xl font-light text-[#1A1A1A] mb-4">How We Use Your Information</h2>
                <p>We use your information only to respond to your inquiry, scope your project, and follow up on the conversation you initiated. We do not sell, rent, or share your personal information with third parties for marketing purposes.</p>
              </div>

              <div>
                <h2 className="text-2xl font-light text-[#1A1A1A] mb-4">Data Retention</h2>
                <p>We retain inquiry data only as long as needed to support the project or business relationship. You can request deletion of your data at any time by emailing <a href="mailto:Ilan@crystal-ball.ca" className="text-darkheading underline hover:text-glass transition">Ilan@crystal-ball.ca</a>.</p>
              </div>

              <div>
                <h2 className="text-2xl font-light text-[#1A1A1A] mb-4">Cookies & Analytics</h2>
                <p>We may use privacy-respecting analytics (such as Google Analytics or Microsoft Clarity) to understand how the site is used. These services may set cookies. You can disable cookies in your browser settings without losing site functionality.</p>
              </div>

              <div>
                <h2 className="text-2xl font-light text-[#1A1A1A] mb-4">Your Rights</h2>
                <p>Under Canadian privacy law (PIPEDA), you have the right to access, correct, or delete personal information we hold about you. To exercise these rights, email <a href="mailto:Ilan@crystal-ball.ca" className="text-darkheading underline hover:text-glass transition">Ilan@crystal-ball.ca</a>.</p>
              </div>

              <div>
                <h2 className="text-2xl font-light text-[#1A1A1A] mb-4">Contact</h2>
                <p>Questions about this policy can be directed to:</p>
                <p className="mt-4"><strong>Crystal Ball Windows & Doors Ltd.</strong><br/>Ontario, Canada<br/>Email: <a href="mailto:Ilan@crystal-ball.ca" className="text-darkheading underline hover:text-glass transition">Ilan@crystal-ball.ca</a><br/>Phone: <a href="tel:+16476223226" className="text-darkheading underline hover:text-glass transition">647-622-3226</a></p>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <Header currentPage="" />
          <main className="min-h-screen">
            <PrivacyPage />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
